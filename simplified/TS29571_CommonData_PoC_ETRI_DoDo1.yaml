          $ref: '#/components/schemas/Ipv4Addr'
      required:
      - start
      - end
    Ipv6AddressRange:
      description: Range of IPv6 addresses
      type: object
      properties:
        start:
          $ref: '#/components/schemas/Ipv6Addr'
        end:
          $ref: '#/components/schemas/Ipv6Addr'
      required:
      - start
      - end
    Ipv6PrefixRange:
      description: Range of IPv6 prefixes
      type: object
      properties:
        start:
          $ref: '#/components/schemas/Ipv6Prefix'
        end:
          $ref: '#/components/schemas/Ipv6Prefix'
      required:
      - start
      - end
    NfSignallingInfo:
      description: NF Signalling Information
      type: object
      properties:
        nfSigInfoPerWndw:
          type: array
          items:
            $ref: '#/components/schemas/NfSignallingInfoPerTimeWindow'
          minItems: 1
        avgReqProcTime:
          $ref: '#/components/schemas/Uinteger'
        nfHeartbeatInfo:
          $ref: '#/components/schemas/NfHeartbeatInfo'
        unexpStatusInd:
          type: boolean
          default: false
    NfSignallingInfoPerTimeWindow:
      description: NF Signalling Information Per time window
      type: object
      properties:
        tw:
          $ref: TS29122_CommonData_PoC_ETRI_DoDo1.yaml#/components/schemas/TimeWindow
        nfSigInfoPerService:
          description: |
            The key of the map is the "serviceName" attribute of the NfSignallingInfoPerService data type.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NfSignallingInfoPerService'
          minProperties: 1
      required:
      - tw
      - nfSigInfoPerService
    NfSignallingInfoPerService:
      description: NF signalling information per service.
      type: object
      properties:
        serviceName:
          $ref: SupplementaryData_PoC_ETRI_DoDo1.yaml#/components/schemas/ServiceName
        numOfReq:
          $ref: '#/components/schemas/Uinteger'
        numOfReqUnresp:
          $ref: '#/components/schemas/Uinteger'
        numOfReqReject:
          $ref: '#/components/schemas/Uinteger'
        numOfRedMessages:
          $ref: '#/components/schemas/Uinteger'
        numOfPosteriorReq:
          $ref: '#/components/schemas/Uinteger'
      required:
      - serviceName
    NfHeartbeatInfo:
      description: NF heart beat information.
      type: object
      properties:
        numOfRetrans:
          $ref: '#/components/schemas/Uinteger'
        hbIntvl:
          $ref: '#/components/schemas/Uinteger'
    Dnn:
      type: string
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
    DnnRm:
      type: string
      nullable: true
      description: |
        String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the  Network Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1  and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. 'Label1.Label2.Label3') with the OpenAPI 'nullable: true' property.
    WildcardDnn:
      type: string
      pattern: ^[*]$
      description: String representing the Wildcard DNN. It shall contain the string "*".
    WildcardDnnRm:
      type: string
      pattern: ^[*]$
      nullable: true
      description: |
        String representing the Wildcard DNN. It shall contain the string '*' but with the  OpenAPI 'nullable: true' property.
    Gpsi:
      type: string
      pattern: ^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$
      description: "String identifying a Gpsi shall contain either an External Id or an MSISDN.  It shall be formatted as\
        \ follows -External Identifier= \"extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2 of 3GPP\
        \ TS 23.003 that describes an  External Identifier. \n"
    GpsiRm:
      type: string
      pattern: ^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$
      nullable: true
      description: "String identifying a Gpsi shall contain either an External Id or an MSISDN. It shall be  formatted as\
        \ follows -External Identifier= 'extid-'extid', where 'extid' shall be formatted  according to clause 19.7.2 of 3GPP\
        \ TS 23.003 that describes an External Identifier with the  OpenAPI 'nullable: true' property. \n"
    GroupId:
      type: string
      pattern: ^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$
      description: "String identifying a group of devices network internal globally unique ID which identifies a set of IMSIs,\
        \ as specified in clause 19.9 of 3GPP TS 23.003. \n"
    GroupIdRm:
      type: string
      pattern: ^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$
      nullable: true
      description: |
        String identifying a group of devices network internal globally unique ID which identifies a set of IMSIs, as specified in clause 19.9 of 3GPP TS 23.003 with the OpenAPI 'nullable: true' property.
    ExternalGroupId:
      type: string
      pattern: ^extgroupid-[^@]+@[^@]+$
      description: "String identifying External Group Identifier that identifies a group made up of one or more  subscriptions\
        \ associated to a group of IMSIs, as specified in clause 19.7.3 of 3GPP TS 23.003. \n"
    ExternalGroupIdRm:
      type: string
      pattern: ^extgroupid-[^@]+@[^@]+$
      nullable: true
      description: "String identifying External Group Identifier that identifies a group made up of one or more  subscriptions\
        \ associated to a group of IMSIs, as specified in clause 19.7.3 of  3GPP TS 23.003  with the OpenAPI 'nullable: true'\
        \ property. \n"
    Pei:
      type: string
      pattern: ^(imei-[0-9]{15}|imeisv-[0-9]{16}|mac((-[0-9a-fA-F]{2}){6})(-untrusted)?|eui((-[0-9a-fA-F]{2}){8})|.+)$
      description: "String representing a Permanent Equipment Identifier that may contain - an IMEI or IMEISV, as  specified\
        \ in clause 6.2 of 3GPP TS 23.003; a MAC address for a 5G-RG or FN-RG via  wireline  access, with an indication that\
        \ this address cannot be trusted for regulatory purpose if this  address cannot be used as an Equipment Identifier\
        \ of the FN-RG, as specified in clause 4.7.7  of 3GPP TS23.316. Examples are imei-012345678901234 or imeisv-0123456789012345.\
        \ \n"
    PeiRm:
      type: string
      pattern: ^(imei-[0-9]{15}|imeisv-[0-9]{16}|mac((-[0-9a-fA-F]{2}){6})(-untrusted)?|eui((-[0-9a-fA-F]{2}){8})|.+)$
      nullable: true
      description: |
        This data type is defined in the same way as the 'Pei' data type but with the OpenAPI 'nullable: true' property.
    Supi:
      type: string
      pattern: ^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$
      description: "String identifying a Supi that shall contain either an IMSI, a network specific identifier,\na Global\
        \ Cable Identifier (GCI) or a Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It shall\
        \ be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi> shall be formatted according to clause 2.2\n\
        \   of 3GPP TS 23.003 that describes an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai> shall\
        \ be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
        , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\", where\
        \ <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the value is used as part\
        \ of an URI, the string shall\n   only contain characters allowed according to the \"lower-with-hyphen\" naming convention\n\
        \   defined in 3GPP TS 29.501.\n"
    SupiRm:
      type: string
      pattern: ^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$
      nullable: true
      description: "This data type is defined in the same way as the 'Supi' data type, but with the  OpenAPI 'nullable: true'\
        \ property. \n"
    NfInstanceId:
      type: string
      format: uuid
      description: "String uniquely identifying a NF instance. The format of the NF Instance ID shall be a  Universally Unique\
        \ Identifier (UUID) version 4. \n"
    AmfId:
      type: string
      pattern: ^[A-Fa-f0-9]{6}$
      description: "String identifying the AMF ID composed of AMF Region ID (8 bits), AMF Set ID (10 bits) and AMF  Pointer\
        \ (6 bits) as specified in clause 2.10.1 of 3GPP TS 23.003. It is encoded as a string of  6 hexadecimal characters\
        \ (i.e., 24 bits). \n"
    AmfRegionId:
      type: string
      pattern: ^[A-Fa-f0-9]{2}$
      description: |
        String identifying the AMF Set ID (10 bits) as specified in clause 2.10.1 of 3GPP TS 23.003.  It is encoded as a string of 3 hexadecimal characters where the first character is limited to  values 0 to 3 (i.e. 10 bits)
    AmfSetId:
      type: string
      pattern: ^[0-3][A-Fa-f0-9]{2}$
      description: |
        String identifying the AMF Set ID (10 bits) as specified in clause 2.10.1 of 3GPP TS 23.003.  It is encoded as a string of 3 hexadecimal characters where the first character is limited to  values 0 to 3 (i.e. 10 bits).
    RfspIndex:
      type: integer
      minimum: 1
      maximum: 256
      description: |
        Unsigned integer representing the "Subscriber Profile ID for RAT/Frequency Priority"  as specified in 3GPP TS 36.413.
    RfspIndexRm:
      type: integer
      minimum: 1
      maximum: 256
      nullable: true
      description: "Unsigned integer representing the 'Subscriber Profile ID for RAT/Frequency Priority'  as specified in\
        \ 3GPP TS 36.413 with the OpenAPI 'nullable: true' property. \n"
    NfGroupId:
      type: string
      description: Identifier of a group of NFs.
    MtcProviderInformation:
      type: string
      description: String uniquely identifying MTC provider information.
    CagId:
      type: string
      pattern: ^[A-Fa-f0-9]{8}$
      description: String containing a Closed Access Group Identifier.
    SupiOrSuci:
      type: string
      pattern: ^(imsi-[0-9]{5,15}|nai-.+|gli-.+|gci-.+|suci-(0-[0-9]{3}-[0-9]{2,3}|[1-7]-.+)-[0-9]{1,4}-(0-0-.*|[a-fA-F1-9]-([1-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])-[a-fA-F0-9]+)|.+)$
      description: String identifying a SUPI or a SUCI.
    Imsi:
      description: String identifying an IMSI
      type: string
      pattern: ^[0-9]{5,15}$
    ApplicationlayerId:
      type: string
      description: |
        String identifying an UE with application layer ID. The format of the application  layer ID parameter is same as the Application layer ID defined in clause 11.3.4 of  3GPP TS 24.554.
    NsacSai:
      type: string
      description: |
        String identifying the Network Slice Admission Control Service Area Identifier.
    GroupServiceId:
      anyOf:
      - type: integer
        enum:
        - 1
        - 2
        - 3
      - type: integer
        description: |
          This integer provides forward-compatibility with future extensions to the enumeration but is not used to encode content defined in the present version of this API.
      description: |
        Possible values are:
        - 1: Group specific NAS level congestion control
        - 2: Group specific Monitoring of Number of UEs present in a geographical area
        - 3: Group specific Group specific for 5G LAN Type service
    Guami:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnIdNid'
        amfId:
          $ref: '#/components/schemas/AmfId'
      required:
      - plmnId
      - amfId
      description: Globally Unique AMF Identifier constructed out of PLMN, Network and AMF identity.
    GuamiRm:
      anyOf:
      - $ref: '#/components/schemas/Guami'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'Guami' data type, but with the OpenAPI 'nullable: true' property.
    NetworkId:
      type: object
      properties:
        mnc:
          $ref: '#/components/schemas/Mnc'
        mcc:
          $ref: '#/components/schemas/Mcc'
      description: contains PLMN and Network identity.
    ApplicationId:
      type: string
      description: String providing an application identifier.
    ApplicationIdRm:
      type: string
      nullable: true
      description: |
        String providing an application identifier with the OpenAPI 'nullable: true' property.
    PduSessionId:
      type: integer
      minimum: 0
      maximum: 255
      description: "Unsigned integer identifying a PDU session, within the range 0 to 255, as specified in  clause 11.2.3.1b,\
        \ bits 1 to 8, of 3GPP TS 24.007. If the PDU Session ID is allocated by the  Core Network for UEs not supporting N1\
        \ mode, reserved range 64 to 95 is used. PDU Session ID  within the reserved range is only visible in the Core Network.\
        \ \n"
    Mcc:
      type: string
      pattern: ^\d{3}$
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.\
        \ \n"
    MccRm:
      type: string
      pattern: ^\d{3}$
      nullable: true
      description: |
        Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of  3GPP TS 38.413 with the OpenAPI 'nullable: true' property.
    Mnc:
      type: string
      pattern: ^\d{2,3}$
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in  clause 9.3.3.5 of 3GPP\
        \ TS 38.413. \n"
    MncRm:
      type: string
      pattern: ^\d{2,3}$
      nullable: true
      description: |
        Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413 with the OpenAPI 'nullable: true' property.
    Tac:
      type: string
      pattern: (^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)
      description: "2 or 3-octet string identifying a tracking area code as specified in clause 9.3.3.10  of 3GPP TS 38.413,\
        \ in hexadecimal representation. Each character in the string shall  take a value of \"0\" to \"9\", \"a\" to \"f\"\
        \ or \"A\" to \"F\" and shall represent 4 bits. The most significant character representing the 4 most significant\
        \ bits of the TAC shall  appear first in the string, and the character representing the 4 least significant bit  of\
        \ the TAC shall appear last in the string. \n"
    TacRm:
      type: string
      pattern: (^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)
      nullable: true
      description: |
        This data type is defined in the same way as the 'Tac' data type, but with the OpenAPI 'nullable: true' property.
    EutraCellId:
      type: string
      pattern: ^[A-Fa-f0-9]{7}$
      description: "28-bit string identifying an E-UTRA Cell Id as specified in clause 9.3.1.9 of  3GPP TS 38.413, in hexadecimal\
        \ representation. Each character in the string shall take a  value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most  significant character representing the 4 most significant bits of the Cell\
        \ Id shall appear  first in the string, and the character representing the 4 least significant bit of the  Cell Id\
        \ shall appear last in the string. \n"
    EutraCellIdRm:
      type: string
      pattern: ^[A-Fa-f0-9]{7}$
      nullable: true
      description: |
        This data type is defined in the same way as the 'EutraCellId' data type, but with the OpenAPI 'nullable: true' property.
    NrCellId:
      type: string
      pattern: ^[A-Fa-f0-9]{9}$
      description: "36-bit string identifying an NR Cell Id as specified in clause 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal\
        \ representation. Each character in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most significant character  representing the 4 most significant bits of the Cell\
        \ Id shall appear first in the string, and  the character representing the 4 least significant bit of the Cell Id\
        \ shall appear last in the  string. \n"
    NrCellIdRm:
      type: string
      pattern: ^[A-Fa-f0-9]{9}$
      nullable: true
      description: |
        This data type is defined in the same way as the 'NrCellId' data type, but with the OpenAPI 'nullable: true' property.
    Dnai:
      type: string
      description: DNAI (Data network access identifier), see clause 5.6.7 of 3GPP TS 23.501.
    DnaiRm:
      type: string
      nullable: true
      description: |
        This data type is defined in the same way as the 'Dnai' data type, but with the OpenAPI 'nullable: true' property.
    5GMmCause:
      $ref: '#/components/schemas/Uinteger'
    AmfName:
      $ref: '#/components/schemas/Fqdn'
    AreaCode:
      type: string
      description: Values are operator specific.
    AreaCodeRm:
      type: string
      nullable: true
      description: |
        This data type is defined in the same way as the 'AreaCode' data type, but with the OpenAPI 'nullable: true' property.
    N3IwfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the N3IWF ID as specified in clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal\
        \ representation. Each character in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most significant  character representing the 4 most significant bits of the N3IWF\
        \ ID shall appear first in the  string, and the character representing the 4 least significant bit of the N3IWF ID\
        \ shall  appear last in the string. \n"
    WAgfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the W-AGF ID as specified in clause 9.3.1.162 of  3GPP TS 38.413 in\
        \ hexadecimal representation. Each character in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or\
        \ \"A\" to \"F\" and shall represent 4 bits. The most significant  character representing the 4 most significant bits\
        \ of the W-AGF ID shall appear first in the  string, and the character representing the 4 least significant bit of\
        \ the W-AGF ID shall  appear last in the string. \n"
    TngfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the TNGF ID as specified in clause 9.3.1.161 of  3GPP TS 38.413  in\
        \ hexadecimal representation. Each character in the string shall take a value of \"0\" to \"9\", \"a\"  to \"f\" or\
        \ \"A\" to \"F\" and shall represent 4 bits. The most significant character representing the  4 most significant bits\
        \ of the TNGF ID shall appear first in the string, and the character  representing the 4 least significant bit of\
        \ the TNGF ID shall appear last in the string. \n"
    NgeNbId:
      type: string
      pattern: ^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$
      description: "This represents the identifier of the ng-eNB ID as specified in clause 9.3.1.8 of  3GPP TS 38.413. The\
        \ value of the ng-eNB ID shall be encoded in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent 4 bits. The padding 0 shall be\
        \ added to make multiple nibbles, so the most  significant character representing the padding 0 if required together\
        \ with the 4 most  significant bits of the ng-eNB ID shall appear first in the string, and the character  representing\
        \ the 4 least significant bit of the ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
    Nid:
      type: string
      pattern: ^[A-Fa-f0-9]{11}$
      description: "This represents the Network Identifier, which together with a PLMN ID is used to identify an SNPN (see\
        \ 3GPP TS 23.003 and 3GPP TS 23.501 clause 5.30.2.1). \n"
    NidRm:
      type: string
      pattern: ^[A-Fa-f0-9]{11}$
      nullable: true
      description: |
        This data type is defined in the same way as the 'Nid' data type, but with the OpenAPI 'nullable: true' property."
    NfSetId:
      type: string
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC> encoded as defined in clause 5.4.2 (\"\
        Mcc\" data type definition)  <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3 digits. \n  If\
        \ there are only 2 significant digits in the MNC, one \"0\" digit shall be inserted \n  at the left side to fill the\
        \ 3 digits coding of MNC.  Pattern: '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of 3GPP\
        \ TS 29.510 but \n  with lower case characters <Set ID> encoded as a string of characters consisting of \n  alphabetic\
        \ characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that \n  shall end with either an alphabetic character\
        \ or a digit. \n"
    NfServiceSetId:
      type: string
      description: "NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003) formatted as the following  string \"set<Set\
        \ ID>.sn<Service Name>.nfi<NF Instance ID>.5gc.mnc<MNC>.mcc<MCC>\", or  \"set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\"\
        \ with  <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)   <MNC> encoding the Mobile Network\
        \ Code part of the PLMN, comprising 3 digits. \n  If there are only 2 significant digits in the MNC, one \"0\" digit\
        \ shall be inserted \n  at the left side to fill the 3 digits coding of MNC.  Pattern: '^[0-9]{3}$'\n<NID> encoded\
        \ as defined in clause 5.4.2 (\"Nid\" data type definition)  <NFInstanceId> encoded as defined in clause 5.3.2  <ServiceName>\
        \ encoded as defined in 3GPP TS 29.510  <Set ID> encoded as a string of characters consisting of alphabetic \n  characters\
        \ (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that shall end \n  with either an alphabetic character or\
        \ a digit.\n"
    PlmnAssiUeRadioCapId:
      $ref: '#/components/schemas/Bytes'
    ManAssiUeRadioCapId:
      $ref: '#/components/schemas/Bytes'
    TypeAllocationCode:
      type: string
      pattern: ^[0-9]{8}$
      description: |
        Type Allocation Code (TAC) of the UE, comprising the initial eight-digit portion of the 15-digit IMEI and 16-digit IMEISV codes. See clause 6.2 of 3GPP TS 23.003.
    HfcNId:
      type: string
      maxLength: 6
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
    HfcNIdRm:
      type: string
      maxLength: 6
      nullable: true
      description: |
        This data type is defined in the same way as the 'HfcNId' data type, but with the OpenAPI 'nullable: true' property.
    ENbId:
      type: string
      pattern: ^(MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5}|HomeeNB-[A-Fa-f0-9]{7})$
      description: |
        This represents the identifier of the eNB ID as specified in clause 9.2.1.37 of  3GPP TS 36.413. The string shall be formatted with the following pattern  '^('MacroeNB-[A-Fa-f0-9]{5}|LMacroeNB-[A-Fa-f0-9]{6}|SMacroeNB-[A-Fa-f0-9]{5} |HomeeNB-[A-Fa-f0-9]{7})$'. The value of the eNB ID shall be encoded in hexadecimal representation. Each character in the  string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits.  The padding 0 shall be added to make multiple nibbles, so the most significant character  representing the padding 0 if required together with the 4 most significant bits of the eNB ID  shall appear first in the string, and the character representing the 4 least significant bit  of the eNB ID (to form a nibble) shall appear last in the string.
    Gli:
      $ref: '#/components/schemas/Bytes'
    Gci:
      type: string
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
    NsSrg:
      type: string
      description: |
        String providing a Network Slice Simultaneous Registration Group. See clause 5.15.12 of  3GPP TS 23.501
    NsSrgRm:
      type: string
      nullable: true
      description: |
        String providing a Network Slice Simultaneous Registration Group with the OpenAPI "nullable: true" property. See clause 5.15.12 of 3GPP TS 23.501
    RelayServiceCode:
      type: integer
      minimum: 0
      maximum: 16777215
      description: |
        Relay Service Code to identify a connectivity service provided by the UE-to-Network relay or the UE-to-UE relay.
    5GPrukId:
      type: string
      description: |
        A string carrying the CP-PRUK ID of the 5G ProSe Remote UE or the 5G ProSe End UE. The CP-PRUK ID is a string in NAI format as specified in clause 28.7.11 of 3GPP TS 23.003.
      pattern: ^rid[0-9]{1,4}\.pid[0-9a-fA-F]+\@prose-cp\.5gc\.mnc[0-9]{2,3}\.mcc[0-9]{3}\.3gppnetwork\.org$
    NsagId:
      type: integer
      description: |
        The Network Slice AS Group ID, see 3GPP TS 38.413
    NsagIdRm:
      type: integer
      nullable: true
      description: |
        This data type is defined in the same way as the "NsagId" data type, but with the OpenAPI "nullable: true" property
    GeoSatelliteId:
      type: string
      description: |
        A string carrying the GEO Satellite ID.
    OffloadIdentifier:
      type: string
      description: |
        Offload identifier uniquely identifying a VPLMN offloading policy information instance
      pattern: ^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{8}(-v[0-9]{1,2}){0,1}$
    OpConfiguredCapability:
      type: string
      description: |
        The operator configurable capability supported by the UPF.
    SatelliteId:
      type: string
      description: |
        Unique identifier of a satellite.
    EnergySavingIndicator:
      $ref: '#/components/schemas/Uinteger'
    AccessType:
      type: string
      enum:
      - 3GPP_ACCESS
      - NON_3GPP_ACCESS
      description: Indicates whether the access is  via 3GPP or via non-3GPP.
    AccessTypeRm:
      anyOf:
      - $ref: '#/components/schemas/AccessType'
      - $ref: '#/components/schemas/NullValue'
      description: |
        Indicates wether the access is via 3GPP or via non-3GPP but with the OpenAPI  'nullable: true' property."
    RatType:
      type: string
      description: Indicates the radio access used.
    RatTypeRm:
      anyOf:
      - $ref: '#/components/schemas/RatType'
      - $ref: '#/components/schemas/NullValue'
      description: "Provides information about the radio access but with the OpenAPI 'nullable: true' property. \n"
    PduSessionType:
      type: string
      description: "PduSessionType indicates the type of a PDU session. It shall comply with the provisions defined in table\
        \ 5.4.3.3-1. \n"
    PduSessionTypeRm:
      anyOf:
      - $ref: '#/components/schemas/PduSessionType'
      - $ref: '#/components/schemas/NullValue'
      description: "PduSessionType indicates the type of a PDU session. It shall comply with the provisions defined in table\
        \ 5.4.3.3-1 but with the OpenAPI \"nullable: true\" property. \n"
    UpIntegrity:
      type: string
      description: "indicates whether UP integrity protection is required, preferred or not needed for all the traffic on\
        \ the PDU Session. It shall comply with the provisions defined in  table 5.4.3.4-1. \n"
    UpIntegrityRm:
      anyOf:
      - $ref: '#/components/schemas/UpIntegrity'
      - $ref: '#/components/schemas/NullValue'
      description: "indicates whether UP integrity protection is required, preferred or not needed for all the traffic on\
        \ the PDU Session. It shall comply with the provisions defined in table 5.4.3.4-1. \n"
    UpConfidentiality:
      type: string
      description: |
        indicates whether UP confidentiality protection is required, preferred or not needed for all the traffic on the PDU Session. It shall comply with the provisions defined in table 5.4.3.5-1.
    UpConfidentialityRm:
      anyOf:
      - $ref: '#/components/schemas/UpConfidentiality'
      - $ref: '#/components/schemas/NullValue'
      description: "indicates whether UP integrity protection is required, preferred or not needed for all the  traffic on\
        \ the PDU Session. It shall comply with the provisions defined in table 5.4.3.4-1, but with the OpenAPI 'nullable:\
        \ true' property. \n"
    SscMode:
      type: string
      description: "represents the service and session continuity mode It shall comply with the provisions defined in table\
        \ 5.4.3.6-1. \n"
    SscModeRm:
      anyOf:
      - $ref: '#/components/schemas/SscMode'
      - $ref: '#/components/schemas/NullValue'
      description: "represents the service and session continuity mode It shall comply with the provisions defined in table\
        \ 5.4.3.6-1 but with the OpenAPI 'nullable: true' property. \n"
    DnaiChangeType:
      type: string
      description: "Possible values are:\n- EARLY: Early notification of UP path reconfiguration.\n- EARLY_LATE: Early and\
        \ late notification of UP path reconfiguration. This value shall\n  only be present in the subscription to the DNAI\
        \ change event.\n- LATE: Late notification of UP path reconfiguration. \n"
    DnaiChangeTypeRm:
      anyOf:
      - $ref: '#/components/schemas/DnaiChangeType'
      - $ref: '#/components/schemas/NullValue'
      description: "It can take the values  as specified for DnaiChangeType but with the OpenAPI 'nullable: true' property.\
        \ \n"
    RestrictionType:
      type: string
      description: It contains the restriction type ALLOWED_AREAS or NOT_ALLOWED_AREAS.
    RestrictionTypeRm:
      anyOf:
      - $ref: '#/components/schemas/RestrictionType'
      - $ref: '#/components/schemas/NullValue'
      description: "It contains the restriction type ALLOWED_AREAS or NOT_ALLOWED_AREAS but with the OpenAPI 'nullable: true'\
        \ property. \n"
    CoreNetworkType:
      type: string
      description: It contains the Core Network type 5GC or EPC.
    CoreNetworkTypeRm:
      anyOf:
      - $ref: '#/components/schemas/CoreNetworkType'
      - $ref: '#/components/schemas/NullValue'
      description: "It contains the Core Network type 5GC or EPC but with the OpenAPI 'nullable: true' property. \n"
    PresenceState:
      type: string
      description: "Possible values are:\n-IN_AREA: Indicates that the UE is inside or enters the presence reporting area.\n\
        -OUT_OF_AREA: Indicates that the UE is outside or leaves the presence reporting area\n-UNKNOW: Indicates it is unknown\
        \ whether the UE is in the presence reporting area or not\n-INACTIVE: Indicates that the presence reporting area is\
        \ inactive in the serving node. \n"
    StationaryIndication:
      type: string
      description: |
        Possible values are:
        - STATIONARY: Identifies the UE is stationary
        - MOBILE: Identifies the UE is mobile
    StationaryIndicationRm:
      anyOf:
      - $ref: '#/components/schemas/StationaryIndication'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This enumeration is defined in the same way as the 'StationaryIndication' enumeration, but with the OpenAPI 'nullable: true' property."
    ScheduledCommunicationType:
      type: string
      description: |
        Possible values are:
        -DOWNLINK_ONLY: Downlink only
        -UPLINK_ONLY: Uplink only
        -BIDIRECTIONA: Bi-directional
    ScheduledCommunicationTypeRm:
      anyOf:
      - $ref: '#/components/schemas/ScheduledCommunicationType'
      - $ref: '#/components/schemas/NullValue'
      description: "This enumeration is defined in the same way as the 'ScheduledCommunicationTypen' enumeration, but with\
        \ the OpenAPI 'nullable: true' property.\" \n"
    TrafficProfile:
      type: string
      description: "Possible values are:\n- SINGLE_TRANS_UL: Uplink single packet transmission.\n- SINGLE_TRANS_DL: Downlink\
        \ single packet transmission.\n- DUAL_TRANS_UL_FIRST: Dual packet transmission, firstly uplink packet transmission\n\
        \  with subsequent downlink packet transmission.\n- DUAL_TRANS_DL_FIRST: Dual packet transmission, firstly downlink\
        \ packet transmission\n  with subsequent uplink packet transmission. \n"
    TrafficProfileRm:
      anyOf:
      - $ref: '#/components/schemas/TrafficProfile'
      - $ref: '#/components/schemas/NullValue'
      description: "This enumeration is defined in the same way as the 'TrafficProfile' enumeration, but with the OpenAPI\
        \ 'nullable: true' property. \n"
    LcsServiceAuth:
      type: string
      description: |
        Possible values are:
        - "LOCATION_ALLOWED_WITH_NOTIFICATION": Location allowed with notification
        - "LOCATION_ALLOWED_WITHOUT_NOTIFICATION": Location allowed without notification
        - "LOCATION_ALLOWED_WITHOUT_RESPONSE": Location with notification and privacy
           verification; location allowed if no response
        - "LOCATION_RESTRICTED_WITHOUT_RESPONSE": Location with notification and privacy
          verification; location restricted if no response
        - "NOTIFICATION_ONLY": Notification only
        - "NOTIFICATION_AND_VERIFICATION_ONLY": Notification and privacy verification only
    UeAuth:
      type: string
      description: |
        Possible values are:
        - AUTHORIZED: Indicates that the UE is authorized.
        - NOT_AUTHORIZED: Indicates that the UE is not authorized.
    DlDataDeliveryStatus:
      type: string
      description: |
        Possible values are:
        - BUFFERED: The first downlink data is buffered with extended buffering matching the
          source of the downlink traffic.
        - TRANSMITTED: The first downlink data matching the source of the downlink traffic is
          transmitted after previous buffering or discarding of corresponding packet(s) because
          the UE of the PDU Session becomes ACTIVE, and buffered data can be delivered to UE.
        - DISCARDED: The first downlink data matching the source of the downlink traffic is
          discarded because the Extended Buffering time, as determined by the SMF, expires or
          the amount of downlink data to be buffered is exceeded.
    DlDataDeliveryStatusRm:
      anyOf:
      - $ref: '#/components/schemas/DlDataDeliveryStatus'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the ' DlDataDeliveryStatus ' data type, but with the OpenAPI\
        \ 'nullable: true' property. \n"
    AuthStatus:
      type: string
      description: "Possible values are:\n- \"EAP_SUCCESS\": The NSSAA status is EAP-Success.\n- \"EAP_FAILURE\": The NSSAA\
        \ status is EAP-Failure.\n- \"PENDING\": The NSSAA status is Pending. \n"
    LineType:
      type: string
      description: |
        Possible values are:
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
    LineTypeRm:
      anyOf:
      - $ref: '#/components/schemas/LineType'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'LineType' data type, but with the OpenAPI 'nullable:\
        \ true' property. \n"
    NotificationFlag:
      type: string
      description: "Possible values are:\n- ACTIVATE: The event notification is activated.\n- DEACTIVATE: The event notification\
        \ is deactivated and shall be muted. The available\n   event(s) shall be stored.\n- RETRIEVAL: The event notification\
        \ shall be sent to the NF service consumer(s),\n  after that, is muted again. \n"
    TransportProtocol:
      type: string
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission Control Protocol. \n"
    SatelliteBackhaulCategory:
      type: string
      description: Indicates the satellite backhaul used.
    SatelliteBackhaulCategoryRm:
      anyOf:
      - $ref: '#/components/schemas/SatelliteBackhaulCategory'
      - $ref: '#/components/schemas/NullValue'
      description: "Provides information about the satellite backhaul but with the OpenAPI 'nullable: true' property. \n"
    BufferedNotificationsAction:
      type: string
      description: |
        Indicates the required action by the event producer NF on the buffered Notifications.
    SubscriptionAction:
      type: string
      description: |
        Indicates the required action by the event producer NF on the event subscription if an exception occurs while the event is muted.
    SnssaiStatus:
      type: string
      description: Indicates the S-NSSAI availability.
    TerminationIndication:
      type: string
      description: Indicates the termination of Network Slice Replacement.
    DelayMeasurementProtocol:
      type: string
      description: Delay measurement protocol
    SubscribedDefaultQos:
      type: object
      required:
      - 5qi
      - arp
      properties:
        5qi:
          $ref: '#/components/schemas/5Qi'
        arp:
          $ref: '#/components/schemas/Arp'
        priorityLevel:
          $ref: '#/components/schemas/5QiPriorityLevel'
      description: Provides the subsribed 5QI and the ARP, it may contain the priority level.
    Snssai:
      type: object
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
          description: "Unsigned integer, within the range 0 to 255, representing the Slice/Service Type.  It indicates the\
            \ expected Network Slice behaviour in terms of features and services. Values 0 to 127 correspond to the standardized\
            \ SST range. Values 128 to 255 correspond  to the Operator-specific range. See clause 28.4.2 of 3GPP TS 23.003.\
            \ Standardized values are defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
        sd:
          type: string
          pattern: ^[A-Fa-f0-9]{6}$
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      required:
      - sst
    PlmnId:
      type: object
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
      description: |
        When PlmnId needs to be converted to string (e.g. when used in maps as key), the string  shall be composed of three digits "mcc" followed by "-" and two or three digits "mnc".
      required:
      - mcc
      - mnc
    PlmnIdRm:
      anyOf:
      - $ref: '#/components/schemas/PlmnId'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'PlmnId' data type, but with the OpenAPI 'nullable: true'\
        \ property. \n"
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        tac:
          $ref: '#/components/schemas/Tac'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - tac
    TaiRm:
      anyOf:
      - $ref: '#/components/schemas/Tai'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'Tai' data type, but with the OpenAPI 'nullable: true'\
        \ property. \n"
    Ecgi:
      description: Contains the ECGI (E-UTRAN Cell Global Identity), as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        eutraCellId:
          $ref: '#/components/schemas/EutraCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - eutraCellId
    EcgiRm:
      anyOf:
      - $ref: '#/components/schemas/Ecgi'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'Ecgi' data type, but with the OpenAPI 'nullable: true' property.
    Ncgi:
      description: Contains the NCGI (NR Cell Global Identity), as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        nrCellId:
          $ref: '#/components/schemas/NrCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - nrCellId
    NcgiRm:
      anyOf:
      - $ref: '#/components/schemas/Ncgi'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'Ncgi' data type, but with the  OpenAPI 'nullable: true'\
        \ property. \n"
    UserLocation:
      type: object
      properties:
        eutraLocation:
          $ref: '#/components/schemas/EutraLocation'
        nrLocation:
          $ref: '#/components/schemas/NrLocation'
        n3gaLocation:
          $ref: '#/components/schemas/N3gaLocation'
        utraLocation:
          $ref: '#/components/schemas/UtraLocation'
        geraLocation:
          $ref: '#/components/schemas/GeraLocation'
      description: |
        At least one of eutraLocation, nrLocation and n3gaLocation shall be present. Several of them may be present.
    EutraLocation:
      description: Contains the E-UTRA user location.
      type: object
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ignoreTai:
          type: boolean
          default: false
        ecgi:
          $ref: '#/components/schemas/Ecgi'
        ignoreEcgi:
          type: boolean
          default: false
          description: |
            This flag when present shall indicate that the Ecgi shall be ignored When present, it shall be set as follows: - true: ecgi shall be ignored. - false (default): ecgi shall not be ignored.
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful NG-RAN location reporting procedure with the eNB when the UE is in connected mode.  Any other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        globalNgenbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        globalENbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
      required:
      - tai
      - ecgi
    EutraLocationRm:
      anyOf:
      - $ref: '#/components/schemas/EutraLocation'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'EutraLocation' data type, but with the OpenAPI 'nullable:\
        \ true' property. \n"
    NrLocation:
      description: Contains the NR user location.
      type: object
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ncgi:
          $ref: '#/components/schemas/Ncgi'
        ignoreNcgi:
          type: boolean
          default: false
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful  NG-RAN location reporting procedure with the eNB when the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        globalGnbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        ntnTaiInfo:
          $ref: '#/components/schemas/NtnTaiInfo'
      required:
      - tai
      - ncgi
    NrLocationRm:
      anyOf:
      - $ref: '#/components/schemas/NrLocation'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'NrLocation' data type, but with the OpenAPI 'nullable:\
        \ true' property.\" \n"
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      type: object
      properties:
        n3gppTai:
          $ref: '#/components/schemas/Tai'
        n3IwfId:
          type: string
          pattern: ^[A-Fa-f0-9]+$
          description: "This IE shall contain the N3IWF identifier received over NGAP and shall be encoded as a  string of\
            \ hexadecimal characters. Each character in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\" or\
            \ \"A\" to \"F\" and shall represent 4 bits. The most significant  character representing the 4 most significant\
            \ bits of the N3IWF ID shall appear first in  the string, and the character representing the 4 least significant\
            \ bit of the N3IWF ID  shall appear last in the string. \n"
        ueIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ueIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        protocol:
          $ref: '#/components/schemas/TransportProtocol'
        tnapId:
          $ref: '#/components/schemas/TnapId'
        twapId:
          $ref: '#/components/schemas/TwapId'
        hfcNodeId:
          $ref: '#/components/schemas/HfcNodeId'
        gli:
          $ref: '#/components/schemas/Gli'
        w5gbanLineType:
          $ref: '#/components/schemas/LineType'
        gci:
          $ref: '#/components/schemas/Gci'
    UpSecurity:
      description: Contains Userplain security information.
      type: object
      properties:
        upIntegr:
          $ref: '#/components/schemas/UpIntegrity'
        upConfid:
          $ref: '#/components/schemas/UpConfidentiality'
      required:
      - upIntegr
      - upConfid
    UpSecurityRm:
      anyOf:
      - $ref: '#/components/schemas/UpSecurity'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'UpSecurity' data type, but with the OpenAPI 'nullable: true' property.
    NgApCause:
      description: Represents the NGAP cause.
      type: object
      properties:
        group:
          $ref: '#/components/schemas/Uinteger'
        value:
          $ref: '#/components/schemas/Uinteger'
      required:
      - group
      - value
    BackupAmfInfo:
      description: Provides details of the Backup AMF.
      type: object
      properties:
        backupAmf:
          $ref: '#/components/schemas/AmfName'
        guamiList:
          type: array
          items:
            $ref: '#/components/schemas/Guami'
          minItems: 1
          description: |
            If present, this IE shall contain the list of GUAMI(s) (supported by the AMF) for which the backupAmf IE applies.
      required:
      - backupAmf
    RefToBinaryData:
      description: This parameter provides information about the referenced binary body data.
      type: object
      properties:
        contentId:
          type: string
          description: |
            This IE shall contain the value of the Content-ID header of the referenced binary body part.
      required:
      - contentId
    RefToBinaryDataRm:
      anyOf:
      - $ref: '#/components/schemas/RefToBinaryData'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the ' RefToBinaryData ' data type, but with the OpenAPI 'nullable:\
        \ true' property. \n"
    RouteToLocation:
      type: object
      properties:
        dnai:
          $ref: '#/components/schemas/Dnai'
        routeInfo:
          $ref: '#/components/schemas/RouteInformation'
        routeProfId:
          type: string
          nullable: true
          description: Identifies the routing profile Id.
      required:
      - dnai
      anyOf:
      - required:
        - routeInfo
      - required:
        - routeProfId
      nullable: true
      description: |
        At least one of the "routeInfo" attribute and the "routeProfId" attribute shall be included in the "RouteToLocation" data type.
    RouteInformation:
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
      required:
