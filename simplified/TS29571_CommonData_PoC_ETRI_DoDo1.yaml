      type: integer
      maximum: 64
      default: 64
    TlsId:
      description: The TLS ID for the media stream.
      type: string
      pattern: ^[A-Za-z0-9+/_-]{20,255}$
    MediaResourceType:
      type: string
      description: Indicates the Media Resource type
    MediaProxy:
      type: string
      description: Media Proxy Configuration applicable to the media flow
    SecuritySetup:
      type: string
      description: security setup of the DTLS connection
    BdcUsedBy:
      type: string
      description: The party uses the bootstrap data channel in the media description
    AdcEndpointType:
      type: string
      description: The remote endpoint type of the application data channel
    ImsEvent:
      type: string
      description: The IMS events
    AdcStatus:
      type: string
      description: ADC event status.
    BdcStatus:
      type: string
      description: BDC event status.
    ImsReportMode:
      type: string
      description: Ims event report mode.
    RenderingMode:
      type: string
      description: The rendering mode for avatar media
    DcEndpoint:
      description: Endpoint for Data Channel
      type: object
      properties:
        sctpPort:
          type: integer
          maximum: 65535
          minimum: 0
          description: Local or remote port for Data Channel
        fingerprint:
          deprecated: true
          allOf:
          - $ref: '#/components/schemas/Fingerprint'
        fingerprints:
          type: array
          items:
            $ref: '#/components/schemas/Fingerprint'
          minItems: 1
        tlsId:
          $ref: '#/components/schemas/TlsId'
        securitySetup:
          $ref: '#/components/schemas/SecuritySetup'
    DcStream:
      description: Data Channel mapping and configuration information
      type: object
      not:
        required:
        - maxRetry
        - maxTime
      properties:
        streamId:
          type: integer
          maximum: 65535
          default: 0
          description: Stream identifier for Data Channel
        subprotocol:
          type: string
          pattern: ^[A-Fa-f0-9]{20}$
          description: Subprotocol of the SCTP stream
        order:
          type: boolean
        maxRetry:
          type: integer
          default: 0
          description: maximal number of the times a message will be retransmitted
        maxTime:
          type: integer
          default: 0
          description: |
            maximal lifetime in milliseconds after which a message will no longer be transmitted or retransmitted
        priority:
          type: integer
          default: 256
          description: priority of data channel relative to other data channels
    ReplaceHttpUrl:
      description: replacement HTTP URL per stream
      type: object
      properties:
        replaceHttpUrl:
          $ref: '#/components/schemas/Uri'
        streamId:
          type: integer
          maximum: 65535
          default: 0
          description: Stream identifier for Data Channel
    Endpoint:
      description: Represents the IP endpoint.
      type: object
      required:
      - ip
      - transport
      - portNumber
      properties:
        ip:
          $ref: '#/components/schemas/IpAddr'
        transport:
          $ref: '#/components/schemas/TransportProtocol'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
    AppBindingInfo:
      description: Represents the application binding information.
      type: object
      required:
      - applicationId
      properties:
        applicationId:
          type: string
          description: application binding information of the Data Channel.
        appDcInfo:
          deprecated: true
          allOf:
          - $ref: '#/components/schemas/AppDcInfo'
        appDcInfoList:
          type: array
          items:
            $ref: '#/components/schemas/AppDcInfo'
          minItems: 1
    AppDcInfo:
      description: Represents the application data channel is intened towards to a server or the remote UE.
      type: object
      required:
      - streamId
      properties:
        streamId:
          type: integer
        adcEndpointType:
          $ref: '#/components/schemas/AdcEndpointType'
    MdcEndpoint:
      description: Endpoint for MDC1 and MDC2 interface
      type: object
      required:
      - ip
      - portNumber
      properties:
        ip:
          $ref: '#/components/schemas/IpAddr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        sctpPort:
          type: integer
          maximum: 65535
          minimum: 0
          description: Port number for SCTP connection over DTLS
        fingerprint:
          deprecated: true
          allOf:
          - $ref: '#/components/schemas/Fingerprint'
        fingerprints:
          type: array
          items:
            $ref: '#/components/schemas/Fingerprint'
          minItems: 1
        tlsId:
          $ref: '#/components/schemas/TlsId'
        securitySetup:
          $ref: '#/components/schemas/SecuritySetup'
    ImsReportingOptions:
      description: Ims event reporting options.
      type: object
      properties:
        reportMode:
          $ref: '#/components/schemas/ImsReportMode'
        oneTimeReport:
          type: boolean
        oneTimeNotification:
          type: boolean
        maxNumOfReports:
          type: integer
        reportPeriod:
          $ref: '#/components/schemas/DurationSec'
        expiry:
          $ref: '#/components/schemas/DateTime'
    ImsEventConfiguration:
      description: Ims event configuration information.
      type: object
      required:
      - imsEvent
      properties:
        imsEvent:
          $ref: '#/components/schemas/ImsEvent'
        eventInfo:
          $ref: '#/components/schemas/EventInformation'
        reqCurrentStatus:
          type: boolean
        imsEventFilters:
          type: array
          items:
            $ref: '#/components/schemas/ImsEventFilter'
          minItems: 1
    EventInformation:
      description: Ims event information.
      type: object
      properties:
        adcConfig:
          type: string
        bdcConfig:
          type: string
    ImsEventFilter:
      description: Conditions to match specific Ims event.
      type: object
      properties:
        callingId:
          type: string
          pattern: ^(sip\:([a-zA-Z0-9_\-.!~*()&=+$,;?\/]+)\@([A-Za-z0-9]+([-A-Za-z0-9]+)\.)+[a-z]{2,}|tel\:\+[0-9]{5,15})$
        calledId:
          type: string
          pattern: ^(sip\:([a-zA-Z0-9_\-.!~*()&=+$,;?\/]+)\@([A-Za-z0-9]+([-A-Za-z0-9]+)\.)+[a-z]{2,}|tel\:\+[0-9]{5,15})$
        appBindingInfo:
          $ref: '#/components/schemas/AppBindingInfo'
        sessionId:
          $ref: '#/components/schemas/SessionId'
    ImsEventReport:
      description: Ims event report.
      type: object
      required:
      - imsEvent
      properties:
        imsEvent:
          $ref: '#/components/schemas/ImsEvent'
        eventReport:
          $ref: '#/components/schemas/ImsEventReportInfo'
        sessionId:
          $ref: '#/components/schemas/SessionId'
    ImsEventReportInfo:
      description: Ims event report specific information.
      type: object
      properties:
        adcReport:
          $ref: '#/components/schemas/AdcReport'
        bdcReport:
          $ref: '#/components/schemas/BdcReport'
    AdcReport:
      description: Application data channel report.
      type: object
      required:
      - adcStatus
      properties:
        adcStatus:
          $ref: '#/components/schemas/AdcStatus'
    BdcReport:
      description: Bootstrap data channel report.
      type: object
      required:
      - bdcStatus
      properties:
        bdcStatus:
          $ref: '#/components/schemas/BdcStatus'
    RcdProperties:
      description: Contains the RCD related parameters.
      type: object
      properties:
        rcdSrvAddr:
          $ref: '#/components/schemas/ServerAddressingInfo'
        rcdUrl:
          $ref: '#/components/schemas/Uri'
        rcdInfo:
          $ref: '#/components/schemas/RcdInformation'
    RcdInformation:
      description: |
        Contains a collection of RCD properties as specified in draft-ietf-sipcore-callinfo-rcd and represented as a jCard JSON object.
      type: object
      required:
      - identifProps
      properties:
        identifProps:
          $ref: '#/components/schemas/IdentificationProperties'
        delvAddrProps:
          $ref: '#/components/schemas/DeliveringAddrProperties'
        commsProps:
          $ref: '#/components/schemas/CommunicationsProperties'
        geogrProps:
          $ref: '#/components/schemas/GeographicalProperties'
        organProps:
          $ref: '#/components/schemas/OrganizationalProperties'
        explanProps:
          $ref: '#/components/schemas/ExplanatoryProperties'
    IdentificationProperties:
      description: Represents the identity information of the entity associated with the jCard.
      type: object
      required:
      - fns
      properties:
        fns:
          description: |
            Represent the "fn" property which provides a formatted text corresponding to the name of the object the jCard represents as defined in IETF RFC 6350, section 6.2.1.
          type: array
          items:
            type: string
          minItems: 1
        nProp:
          description: |
            Represent the "n" property which provides the components of the name of the object the jCard represents as defined as defined in IETF RFC 6350, section 6.2.2.
          type: string
        nickNames:
          description: |
            Represent the "nickname" property which provides the text corresponding to the nickname of the object the jCard represents as defined in IETF RFC 6350, section 6.2.3.
          type: array
          items:
            type: string
          minItems: 1
        photos:
          description: |
            Represent the "photo" property which provides image or photograph information that annotates some aspect of the object the jCard represents as defined in IETF RFC 6350, section 6.2.4.
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
    DeliveringAddrProperties:
      description: |
        Represents the information related to the delivery address of the entity associated with the jCard.
      type: object
      properties:
        adrs:
          description: |
            Represent the "adr" property which provides the delivery address of the object the jCard represents as defined in IETF RFC 6350, section 6.3.1.
          type: array
          items:
            type: string
          minItems: 1
    CommunicationsProperties:
      description: Indicates how to communicate with the entity associated with the jCard.
      type: object
      properties:
        tels:
          description: |
            Represent the "tel" property which provides the telephone number for the object the jCard represents as defined in IETF RFC 6350, section 6.4.1.
          type: array
          items:
            type: string
          minItems: 1
        emails:
          description: |
            Represent the "email" property which provides the electronic mail address of the object the jCard represents as defined in IETF RFC 6350, section 6.4.2.
          type: array
          items:
            type: string
          minItems: 1
        langs:
          description: |
            Represent the "lang" property which provides the language(s) that may be used for communicating with the object the jCard represents as defined in IETF RFC 6350, section 6.4.4.
          type: array
          items:
            type: string
          minItems: 1
    GeographicalProperties:
      description: |
        Represents the geographical information associated with the entity associated with the jCard.
      type: object
      properties:
        tzs:
          description: |
            Represent the "tz" property which provides the time zone of the object the jCard represents as defined in IETF RFC 6350, section 6.5.1.
          type: array
          items:
            type: string
          minItems: 1
        geos:
          description: |
            Represent the "geo" property which provides the global positioning of the object the jCard represents as defined in IETF RFC 6350, section 6.5.2.
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
    OrganizationalProperties:
      description: |
        Represents the information associated with characteristics of the organization or organizational units of the entity associated with the jCard.
      type: object
      properties:
        titles:
          description: |
            Represent the "title" property which has the intent of providing the position or job of the object the jCard represents as defined in IETF RFC 6350, section 6.6.1.
          type: array
          items:
            type: string
          minItems: 1
        roles:
          description: |
            Represent the "role" property which has the intent of providing the position or job of the object the jCard represents as defined in IETF RFC 6350, section 6.6.2.
          type: array
          items:
            type: string
          minItems: 1
        logos:
          description: |
            Represent the "logo" property which has the intent of specifying a graphic image of a logo associated with the object the jCard represents as defined in IETF RFC 6350, section 6.6.3.
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
        orgs:
          description: |
            Represent the "org" property which has the intent of specifying the organizational name and units of the object the jCard represents as defined in IETF RFC 6350, section 6.6.4.
          type: array
          items:
            type: string
          minItems: 1
    ExplanatoryProperties:
      description: |
        Indicates an additional information such as an application category information or notes that are specific to the entity associated with the jCard.
      type: object
      required:
      - version
      properties:
        categories:
          description: |
            Represent the "categories" property which specifies application category information about the object the jCard represents as defined in IETF RFC 6350, section 6.7.1.
          type: array
          items:
            type: string
          minItems: 1
        notes:
          description: |
            Represent the "note" property which specifies supplemental information or a comment about the object the jCard represents as defined in IETF RFC 6350, section 6.7.2.
          type: array
          items:
            type: string
          minItems: 1
        sounds:
          description: |
            Represent the "sound" property which specifies digital sound content information that annotates some aspect of the object the jCard represents as defined in IETF RFC 6350, section 6.7.5.
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
        uid:
          $ref: '#/components/schemas/Uri'
        urls:
          description: |
            Represent the "url" property which specifies a uniform resource locator associated with the object the jCard represents as defined in IETF RFC 6350, section 6.7.8.
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
        version:
          description: |
            Represent the "version" property which specifies the version of the vCard specification used to format this vCard as defined in IETF RFC 6350, section 6.7.9.
          type: string
    AiotAreaId:
