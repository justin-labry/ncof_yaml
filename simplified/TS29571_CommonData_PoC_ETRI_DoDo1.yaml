      - status
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        status:
          $ref: '#/components/schemas/AuthStatus'
    NssaaStatusRm:
      anyOf:
      - $ref: '#/components/schemas/NssaaStatus'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'NssaaStatus' data type, but with the OpenAPI 'nullable: true' property.
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      type: object
      properties:
        ssId:
          type: string
          description: "This IE shall be present if the UE is accessing the 5GC via a trusted WLAN access network.When present,\
            \ it shall contain the SSID of the access point to which the UE is attached, that is received over NGAP,  see\
            \ IEEE Std 802.11-2012. \n"
        bssId:
          type: string
          description: "When present, it shall contain the BSSID of the access point to which the UE is attached, that is\
            \ received over NGAP, see IEEE Std 802.11-2012. \n"
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    TnapIdRm:
      anyOf:
      - $ref: '#/components/schemas/TnapId'
      - $ref: '#/components/schemas/NullValue'
      description: "This data type is defined in the same way as the 'TnapId' data type, but with the OpenAPI 'nullable: true'\
        \ property. \n"
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      type: object
      required:
      - ssId
      properties:
        ssId:
          type: string
          description: "This IE shall contain the SSID of the access point to which the UE is attached, that is received over\
            \ NGAP, see IEEE Std 802.11-2012. \n"
        bssId:
          type: string
          description: "When present, it shall contain the BSSID of the access point to which the UE is attached, for trusted\
            \ WLAN access, see IEEE Std 802.11-2012. \n"
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    TwapIdRm:
      anyOf:
      - $ref: '#/components/schemas/TwapId'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'TwapId' data type, but with the OpenAPI 'nullable: true' property.
    SnssaiExtension:
      description: |
        Extensions to the Snssai data type, sdRanges and wildcardSd shall not be present simultaneously
      type: object
      not:
        required:
        - sdRanges
        - wildcardSd
      properties:
        sdRanges:
          description: |
            When present, it shall contain the range(s) of Slice Differentiator values supported for the Slice/Service Type value indicated in the sst attribute of the Snssai data type
          type: array
          items:
            $ref: '#/components/schemas/SdRange'
          minItems: 1
        wildcardSd:
          description: |
            When present, it shall be set to true, to indicate that all SD values are supported for the Slice/Service Type value indicated in the sst attribute of the Snssai data type.
          type: boolean
          enum:
          - true
    SdRange:
      description: A range of SDs (Slice Differentiators)
      type: object
      properties:
        start:
          type: string
          pattern: ^[A-Fa-f0-9]{6}$
          description: |
            First value identifying the start of an SD range. This string shall be formatted as specified for the sd attribute of the Snssai data type in clause 5.4.4.2.
        end:
          type: string
          pattern: ^[A-Fa-f0-9]{6}$
          description: |
            Last value identifying the end of an SD range. This string shall be formatted as specified for the sd attribute of the Snssai data type in clause 5.4.4.2.
    ProseServiceAuth:
      description: |
        Indicates whether the UE is authorized to use related services.
      type: object
      properties:
        proseDirectDiscoveryAuth:
          $ref: '#/components/schemas/UeAuth'
        proseDirectCommunicationAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2RelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3RelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2RemoteAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3RemoteAuth:
          $ref: '#/components/schemas/UeAuth'
        proseMultipathComL2RemoteAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2UeRelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3UeRelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2EndAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3EndAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3IntermediateRelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3RemoteMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3RelayMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3UeRelayMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL3EndMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2IntermediateRelayAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2RemoteMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
        proseL2RelayMultihopAuth:
          $ref: '#/components/schemas/UeAuth'
    EcsServerAddr:
      description: |
        Contains the Edge Configuration Server Address Configuration Information as defined in clause 5.2.3.6.1 of 3GPP TS 23.502.
      type: object
      properties:
        ecsFqdnList:
          type: array
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1
        ecsIpAddressList:
          type: array
          items:
            $ref: '#/components/schemas/IpAddr'
          minItems: 1
        ecsUriList:
          type: array
          items:
            $ref: '#/components/schemas/Uri'
          minItems: 1
        ecsProviderId:
          type: string
    EcsServerAddrRm:
      anyOf:
      - $ref: '#/components/schemas/EcsServerAddr'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the ' EcsServerAddr ' data type, but with the OpenAPI 'nullable: true' property.
    IpAddr:
      description: Contains an IP adresse.
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        ipv6Prefix:
          $ref: '#/components/schemas/Ipv6Prefix'
    SACInfo:
      description: |
        Represents threshold(s) to control the triggering of network slice reporting notifications or the information contained in the network slice reporting notification.
      type: object
      properties:
        numericValNumUes:
          type: integer
        numericValNumPduSess:
          type: integer
        percValueNumUes:
          type: integer
          minimum: 0
          maximum: 100
        percValueNumPduSess:
          type: integer
          minimum: 0
          maximum: 100
        uesWithPduSessionInd:
          type: boolean
          default: false
    SACEventStatus:
      description: |
        Contains the network slice status information in terms of the current number of UEs registered  with a network slice, the current number of PDU Sessions established on a network slice or both.
      type: object
      properties:
        reachedNumUes:
          $ref: '#/components/schemas/SACInfo'
        reachedNumPduSess:
          $ref: '#/components/schemas/SACInfo'
    SpatialValidityCond:
      description: Contains the Spatial Validity Condition.
      type: object
      properties:
        trackingAreaList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
        countries:
          type: array
          items:
            $ref: '#/components/schemas/Mcc'
          minItems: 1
        geographicalServiceArea:
          $ref: '#/components/schemas/GeoServiceArea'
    SpatialValidityCondRm:
      description: Contains the Spatial Validity Condition or the null value.
      anyOf:
      - $ref: '#/components/schemas/SpatialValidityCond'
      - $ref: '#/components/schemas/NullValue'
    ServerAddressingInfo:
      description: Contains addressing information (IP addresses and/or FQDNs) of a server.
      type: object
      anyOf:
      - required:
        - ipv4Addresses
      - required:
        - ipv6Addresses
      - required:
        - fqdnList
      properties:
        ipv4Addresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4Addr'
          minItems: 1
        ipv6Addresses:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6Addr'
          minItems: 1
        fqdnList:
          type: array
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1
    PcfUeCallbackInfo:
      description: |
        Contains the PCF for the UE information necessary for the PCF for the PDU session to send  SM Policy Association Establishment and Termination events.
      type: object
      properties:
        callbackUri:
          $ref: '#/components/schemas/Uri'
        bindingInfo:
          type: string
      nullable: true
      required:
      - callbackUri
    PduSessionInfo:
      description: indicates the DNN and S-NSSAI combination of a PDU session.
      type: object
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        dnn:
          $ref: '#/components/schemas/Dnn'
      required:
      - dnn
      - snssai
    EasIpReplacementInfo:
      description: Contains EAS IP replacement information for a Source and a Target EAS.
      type: object
      properties:
        source:
          $ref: '#/components/schemas/EasServerAddress'
        target:
          $ref: '#/components/schemas/EasServerAddress'
      required:
      - source
      - target
    EasServerAddress:
      description: Represents the IP address and port of an EAS server.
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IpAddr'
        port:
          $ref: '#/components/schemas/Uinteger'
      required:
      - ip
      - port
    RoamingRestrictions:
      description: |
        Indicates if access is allowed to a given serving network, e.g. a PLMN (MCC, MNC) or an  SNPN (MCC, MNC, NID).
      type: object
      properties:
        accessAllowed:
          type: boolean
    GeoServiceArea:
      description: List of geographic area or list of civic address info
      type: object
      properties:
        geographicAreaList:
          type: array
          items:
            $ref: SupplementaryData_PoC_ETRI_DoDo1.yaml#/components/schemas/GeographicArea
          minItems: 1
        civicAddressList:
          type: array
          items:
            $ref: SupplementaryData_PoC_ETRI_DoDo1.yaml#/components/schemas/CivicAddress
          minItems: 1
    MutingExceptionInstructions:
      description: |
        Indicates to an Event producer NF instructions for the subscription and stored events when an exception (e.g. full buffer) occurs at the Event producer NF while the event is muted.
      type: object
      properties:
        bufferedNotifs:
          $ref: '#/components/schemas/BufferedNotificationsAction'
        subscription:
          $ref: '#/components/schemas/SubscriptionAction'
    MutingNotificationsSettings:
      description: |
        Indicates the Event producer NF settings to the Event consumer NF
      type: object
      properties:
        maxNoOfNotif:
          type: integer
        durationBufferedNotif:
          $ref: '#/components/schemas/DurationSec'
    CombGciAndHfcNIds:
      description: |
        Combined Global Cable Identifier and HFC Node Id
      type: object
      properties:
        globalCableId:
          $ref: '#/components/schemas/Gci'
        hfcNId:
          $ref: '#/components/schemas/HfcNId'
    VplmnOffloadingInfo:
      description: VPLMN Specific Offloading Information
      type: object
      nullable: true
      properties:
        offloadIdentifier:
          $ref: '#/components/schemas/OffloadIdentifier'
        vplmnId:
          $ref: '#/components/schemas/PlmnId'
        allowedTraffic:
          type: boolean
          default: true
        ipv4AddressRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4AddressRange'
          minItems: 1
        ipv4AddrMasks:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4AddrMask'
          minItems: 1
        ipv6AddressRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6AddressRange'
          minItems: 1
        ipv6PrefixRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6PrefixRange'
          minItems: 1
        fqdnList:
          type: array
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1
        fqdnPatterns:
          type: array
          items:
            $ref: '#/components/schemas/FqdnPatternMatchingRule'
          minItems: 1
    PartiallyAllowedSnssai:
      description: |
        Indicates a S-NSSAI that is partially allowed in the Registration Area.
      type: object
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        allowedTaiList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
      required:
      - snssai
      - allowedTaiList
    VarRepPeriod:
      description: |
        Indicates the Variable reporting periodicity for event reporting
      type: object
      properties:
        repPeriod:
          $ref: '#/components/schemas/DurationSec'
        percValueNfLoad:
          allOf:
          - $ref: '#/components/schemas/Uinteger'
          minimum: 0
          maximum: 100
      required:
      - repPeriod
    RangingSlPosAuth:
      description: |
        Indicates whether the UE is authorized to use related services.
      type: object
      properties:
        rgSlPosPc5Auth:
          $ref: '#/components/schemas/UeAuth'
        rgSlPosLocAuth:
          $ref: '#/components/schemas/UeAuth'
        rgSlPosClientAuth:
          $ref: '#/components/schemas/UeAuth'
        rgSlPosServerAuth:
          $ref: '#/components/schemas/UeAuth'
    NrA2xAuth:
      description: Contains NR A2X services authorized information.
      type: object
      properties:
        uavUeAuth:
          $ref: '#/components/schemas/UeAuth'
    LteA2xAuth:
      description: Contains LTE A2X services authorized information.
      type: object
      properties:
        uavUeAuth:
          $ref: '#/components/schemas/UeAuth'
    SliceUsageControlInfo:
      description: The network slice usage control related information
      type: object
      required:
      - sNssai
      properties:
        sNssai:
          $ref: '#/components/schemas/Snssai'
        deregInactTimer:
          $ref: '#/components/schemas/DurationSec'
        sessInactTimer:
          $ref: '#/components/schemas/DurationSec'
      anyOf:
      - required:
        - deregInactTimer
      - required:
        - sessInactTimer
    SnssaiDnnItem:
      description: Combination of S-NSSAIs and DNNs
      type: object
      properties:
        snssaiList:
          type: array
          items:
            $ref: '#/components/schemas/ExtSnssai'
          minItems: 1
        dnnList:
          type: array
          items:
            $ref: '#/components/schemas/Dnn'
          minItems: 1
      anyOf:
      - required:
        - snssaiList
      - required:
        - dnnList
    NtnTaiInfo:
      description: Contains NR NTN TAI Information.
      type: object
      required:
      - plmnId
      - tacList
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnIdNid'
        tacList:
          type: array
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
        derivedTac:
          $ref: '#/components/schemas/Tac'
    MitigationInfo:
      description: include the congestion mitigation information.
      type: object
      properties:
        percValueNumUes:
          type: integer
          minimum: 0
          maximum: 100
        newUesInd:
          type: boolean
    VplmnDlAmbr:
      description: an Authorized DL Session AMBR for Offloading for the VPLMN
      type: object
      nullable: true
      properties:
        vplmnId:
          $ref: '#/components/schemas/PlmnId'
        sessionDlAmbr:
          $ref: '#/components/schemas/BitRate'
      required:
      - vplmnId
      - sessionDlAmbr
    LocalOffloadingManagementInfo:
      description: Local Offloading Management Information
      type: object
      nullable: true
      properties:
        offloadIdentifier:
          $ref: '#/components/schemas/OffloadIdentifier'
        allowedTraffic:
          type: boolean
          default: true
        ipv4AddressRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4AddressRange'
          minItems: 1
        ipv4AddrMasks:
          type: array
          items:
            $ref: '#/components/schemas/Ipv4AddrMask'
          minItems: 1
        ipv6AddressRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6AddressRange'
          minItems: 1
        ipv6PrefixRanges:
          type: array
          items:
            $ref: '#/components/schemas/Ipv6PrefixRange'
          minItems: 1
        fqdnList:
          type: array
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1
        fqdnPatterns:
          type: array
          items:
            $ref: '#/components/schemas/FqdnPatternMatchingRule'
          minItems: 1
    CagProvisionInformation:
      description: CAG Provision Information
      type: object
      required:
      - cagInfo
      - commonValidTimePeriodList
      properties:
        cagInfo:
          type: array
          items:
            $ref: '#/components/schemas/CagId'
          minItems: 1
        commonValidTimePeriodList:
          type: array
          items:
            $ref: '#/components/schemas/ValidTimePeriod'
          minItems: 0
        additionalValidTimePeriodList:
          description: |
            A map (list of key-value pairs) where CAG ID coverted to string serves the key; and the value is an array of time periods associted with the CAG ID.
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/ValidTimePeriod'
            minItems: 1
          minProperties: 1
    ExtSnssai:
      allOf:
      - $ref: '#/components/schemas/Snssai'
      - $ref: '#/components/schemas/SnssaiExtension'
      description: |
        The sdRanges and wildcardSd attributes shall be exclusive from each other. If one of these attributes is present,  the sd attribute shall also be present and it shall contain one Slice Differentiator value within the range of SD  (if the sdRanges attribute is present) or with any value (if the wildcardSd attribute is present).
    SnssaiReplaceInfo:
      description: Indicates the status of an S-NSSAI and an alternative S-NSSAI optionally.
      type: object
      properties:
        snssai:
          $ref: '#/components/schemas/Snssai'
        status:
          $ref: '#/components/schemas/SnssaiStatus'
        altSnssai:
          $ref: '#/components/schemas/Snssai'
        nsReplTerminInd:
          $ref: '#/components/schemas/TerminationIndication'
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        mitigationInfo:
          $ref: '#/components/schemas/MitigationInfo'
      required:
      - snssai
    Qfi:
      type: integer
      minimum: 0
      maximum: 63
      description: Unsigned integer identifying a QoS flow, within the range 0 to 63.
    QfiRm:
      type: integer
      minimum: 0
      maximum: 63
      nullable: true
      description: |
        This data type is defined in the same way as the 'Qfi' data type, but with the OpenAPI 'nullable: true' property.
    5Qi:
      type: integer
      minimum: 0
      maximum: 255
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
    5QiRm:
      type: integer
      minimum: 0
      maximum: 255
      nullable: true
      description: |
        This data type is defined in the same way as the '5QiPriorityLevel' data type, but with the OpenAPI 'nullable: true' property. "
    BitRate:
      type: string
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
    BitRateRm:
      type: string
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      nullable: true
      description: |
        This data type is defined in the same way as the 'BitRate' data type, but with the OpenAPI 'nullable: true' property.
    PacketRate:
      type: string
      pattern: ^\d+(\.\d+)? (pps|kpps|Mpps|Gpps|Tpps)$
      description: |
        String representing a packet rate, i.e., packet per second; the prefixes follow the symbols from The International System of Units, and represent x1000 multipliers.
    PacketRateRm:
      type: string
      pattern: ^\d+(\.\d+)? (pps|kpps|Mpps|Gpps|Tpps)$
      nullable: true
      description: |
        This data type is defined in the same way as the 'PacketRate' data type, but with the OpenAPI 'nullable: true' property.
    TrafficVolume:
      type: string
      pattern: ^\d+(\.\d+)? (B|kB|MB|GB|TB)$
      description: |
        String representing a Traffic Volume measured in bytes; the prefixes follow the symbols from The International System of Units, and represent x1000 multipliers.
    TrafficVolumeRm:
      type: string
      pattern: ^\d+(\.\d+)? (B|kB|MB|GB|TB)$
      nullable: true
      description: |
        This data type is defined in the same way as the 'TrafficVolume' data type, but with the OpenAPI 'nullable: true' property.
    ArpPriorityLevelRm:
      type: integer
      minimum: 1
      maximum: 15
      nullable: true
      description: |
        This data type is defined in the same way as the 'ArpPriorityLevel' data type, but with the OpenAPI 'nullable: true' property.
    ArpPriorityLevel:
      type: integer
      minimum: 1
      maximum: 15
      nullable: true
      description: "nullable true shall not be used for this attribute. Unsigned integer indicating the ARP Priority Level\
        \ (see clause 5.7.2.2 of 3GPP TS 23.501, within the range 1 to 15.Values are ordered in decreasing order of priority,\
        \ i.e. with 1 as the highest priority and 15 as the lowest priority. \n"
    5QiPriorityLevel:
      type: integer
      minimum: 1
      maximum: 127
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within\
        \ the range 1 to 127.Values are ordered in decreasing order of priority,  i.e. with 1 as the highest priority and\
        \ 127 as the lowest priority. \n"
    5QiPriorityLevelRm:
      type: integer
      minimum: 1
      maximum: 127
      nullable: true
      description: |
        This data type is defined in the same way as the '5QiPriorityLevel' data type, but with the OpenAPI 'nullable: true' property.
    PacketDelBudget:
      type: integer
      minimum: 1
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
    PacketDelBudgetRm:
      type: integer
      minimum: 1
      nullable: true
      description: |
        This data type is defined in the same way as the 'PacketDelBudget' data type, but with the OpenAPI 'nullable: true' property.
    PacketErrRate:
      type: string
      pattern: ^([0-9]E-[0-9])$
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
    PacketErrRateRm:
      type: string
      pattern: ^([0-9]E-[0-9])$
      nullable: true
      description: |
        This data type is defined in the same way as the 'PacketErrRate' data type, but with the OpenAPI 'nullable: true' property.
    PacketLossRate:
      type: integer
      minimum: 0
      maximum: 1000
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
    PacketLossRateRm:
      type: integer
      minimum: 0
      maximum: 1000
      nullable: true
      description: |
        This data type is defined in the same way as the 'PacketLossRate' data type, but with the OpenAPI 'nullable: true' property.
    AverWindow:
      type: integer
      minimum: 1
      maximum: 4095
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6 and 5.7.4 of 3GPP TS 23.501), expressed\
        \ in milliseconds. \n"
    AverWindowRm:
      type: integer
      maximum: 4095
      default: 2000
      minimum: 1
      nullable: true
      description: |
        This data type is defined in the same way as the 'AverWindow' data type, but with the OpenAPI 'nullable: true' property.
    MaxDataBurstVol:
      type: integer
      minimum: 1
      maximum: 4095
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501),\
        \ expressed in Bytes. \n"
    MaxDataBurstVolRm:
      type: integer
      minimum: 1
      maximum: 4095
      nullable: true
      description: |
        This data type is defined in the same way as the 'MaxDataBurstVol' data type, but with the OpenAPI 'nullable: true' property.
    SamplingRatio:
      type: integer
      minimum: 1
      maximum: 100
      description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1 of 3GPP TS 23.502), expressed in percent.\
        \ \n"
    SamplingRatioRm:
      type: integer
      minimum: 1
      maximum: 100
      nullable: true
      description: "This data type is defined in the same way as the 'SamplingRatio' data type, but with the  OpenAPI 'nullable:\
        \ true' property. \n"
    RgWirelineCharacteristics:
      $ref: '#/components/schemas/Bytes'
    RgWirelineCharacteristicsRm:
      anyOf:
      - $ref: '#/components/schemas/RgWirelineCharacteristics'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'RgWirelineCharacteristics' data type, but with the OpenAPI 'nullable: true' property.
    ExtMaxDataBurstVol:
      type: integer
      minimum: 4096
      maximum: 2000000
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501),\
        \ expressed in Bytes. \n"
    ExtMaxDataBurstVolRm:
      type: integer
      minimum: 4096
      maximum: 2000000
      nullable: true
      description: |
        This data type is defined in the same way as the 'ExtMaxDataBurstVol' data type, but with the OpenAPI 'nullable: true' property.
    ExtPacketDelBudget:
      type: integer
      minimum: 1
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
    ExtPacketDelBudgetRm:
      type: integer
      minimum: 1
      nullable: true
      description: |
        This data type is defined in the same way as the 'ExtPacketDelBudget' data type, but with the OpenAPI 'nullable: true' property. "
    Metadata:
      format: byte
      type: string
      nullable: true
      description: |
        A String which is transparently passed to the UPF to be applied for traffic to SFC.
    PreemptionCapability:
      type: string
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
    PreemptionCapabilityRm:
      anyOf:
      - $ref: '#/components/schemas/PreemptionCapability'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This enumeration is defined in the same way as the 'PreemptionCapability' enumeration, but with the OpenAPI 'nullable: true' property.
    PreemptionVulnerability:
      type: string
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
    PreemptionVulnerabilityRm:
      anyOf:
      - $ref: '#/components/schemas/PreemptionVulnerability'
      - $ref: '#/components/schemas/NullValue'
      description: "This enumeration is defined in the same way as the 'PreemptionVulnerability' enumeration, but with the\
        \ OpenAPI 'nullable: true' property.\" \n"
    ReflectiveQoSAttribute:
      type: string
      description: "The enumeration ReflectiveQosAttribute indicates whether certain traffic of the QoS flow may be subject\
        \ to Reflective QoS (see clause 5.7.2.3 of 3GPP TS 23.501). It shall comply with the provisions defined in table 5.5.3.3-1.\
        \ \n"
    ReflectiveQoSAttributeRm:
      anyOf:
      - $ref: '#/components/schemas/ReflectiveQoSAttribute'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This enumeration is defined in the same way as the 'ReflectiveQosAttribute' enumeration, but with the OpenAPI 'nullable: true' property. "
    NotificationControl:
      type: string
      description: "The enumeration NotificationControl indicates whether notifications are requested from the RAN when the\
        \ GFBR can no longer  (or again) be fulfilled for a QoS Flow during the lifetime of the QoS Flow (see clause 5.7.2.4\
        \ of 3GPP TS 23.501). It shall comply with the provisions defined in table 5.5.3.5-1. \n"
    NotificationControlRm:
      anyOf:
      - $ref: '#/components/schemas/NotificationControl'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This enumeration is defined in the same way as the 'NotificationControl' enumeration, but with the OpenAPI 'nullable: true' property.
    QosResourceType:
      type: string
      description: "The enumeration QosResourceType indicates whether a QoS Flow is non-GBR, delay critical GBR, or non-delay\
        \ critical GBR (see clauses 5.7.3.4 and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined in\
        \ table 5.5.3.6-1. \n"
    QosResourceTypeRm:
      anyOf:
      - $ref: '#/components/schemas/QosResourceType'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This enumeration is defined in the same way as the 'QosResourceType' enumeration, but with the OpenAPI 'nullable: true' property. "
    AdditionalQosFlowInfo:
      anyOf:
      - type: string
      - $ref: '#/components/schemas/NullValue'
      description: |
        The enumeration AdditionalQosFlowInfo provides additional QoS flow information (see clause  9.3.1.12 3GPP TS 38.413 [11]). It shall comply with the provisions defined in table 5.5.3.12-1.
    PartitioningCriteria:
      type: string
      description: |
        Possible values are:
        - "TAC": Type Allocation Code
        - "SUBPLMN": Subscriber PLMN ID
        - "GEOAREA": Geographical area, i.e. list(s) of TAI(s)
        - "SNSSAI": S-NSSAI
        - "DNN": DNN
    PartitioningCriteriaRm:
      anyOf:
      - $ref: '#/components/schemas/PartitioningCriteria'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the ' PartitioningCriteria ' data type, but with the OpenAPI 'nullable: true' property.
    PduSetHandlingInfo:
      type: string
      description: |
        Possible values are:
        - "ALL_PDUS_NEEDED": All PDUs of the PDU Set are needed
        - "ALL_PDUS_NOT_NEEDED": All PDUs of the PDU Set are not needed
    MediaTransportProto:
      type: string
      description: |
        The enumeration MediaTransportProto indicates the transport protocol used for a media flow.
    MediaTransportProtoRm:
      anyOf:
      - $ref: '#/components/schemas/MediaTransportProto'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'MediaTransportProto' data type,  but with the OpenAPI 'nullable: true' property.
    RtpHeaderExtType:
      type: string
      description: "The enumeration indicates the type of Rtp Header Extension type \n"
    RtpHeaderExtTypeRm:
      anyOf:
      - $ref: '#/components/schemas/RtpHeaderExtType'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'RtpHeaderExtType' data type,  but with the OpenAPI 'nullable: true' property.
    RtpPayloadFormat:
      type: string
      description: "The enumeration RtpPayloadFormat indicates the RTP Payload format \n"
    RtpPayloadFormatRm:
      anyOf:
