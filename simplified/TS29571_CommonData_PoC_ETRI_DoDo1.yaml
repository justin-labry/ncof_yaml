      properties:
        keyDomainId:
          $ref: '#/components/schemas/Bytes'
        mskId:
          $ref: '#/components/schemas/Bytes'
        msk:
          $ref: '#/components/schemas/Bytes'
        mskLifetime:
          $ref: '#/components/schemas/DateTime'
        mtkId:
          $ref: '#/components/schemas/Bytes'
        mtk:
          $ref: '#/components/schemas/Bytes'
      required:
      - keyDomainId
      - mskId
    IngressTunAddrInfo:
      description: Ingress Tunnel Address Information
      type: object
      properties:
        ingressTunAddr:
          type: array
