    PresenceInfo:
      type: object
      properties:
        praId:
          type: string
          description: |
            Represents an identifier of the Presence Reporting Area (see clause 28.10 of 3GPP  TS 23.003.  This IE shall be present  if the Area of Interest subscribed or reported is a Presence Reporting Area or a Set of Core Network predefined Presence Reporting Areas. When present, it shall be encoded as a string representing an integer in the following ranges: 0 to 8 388 607 for UE-dedicated PRA 8 388 608 to 16 777 215 for Core Network predefined PRA Examples: PRA ID 123 is encoded as "123" PRA ID 11 238 660 is encoded as "11238660"
        additionalPraId:
          type: string
          description: "This IE may be present if the praId IE is present and if it contains a PRA identifier referring to\
            \ a set of Core Network predefined Presence Reporting Areas. When present, this IE shall contain a PRA Identifier\
            \ of an individual PRA within the Set of Core Network predefined Presence Reporting Areas indicated by the praId\
            \ IE. \n"
        presenceState:
          $ref: '#/components/schemas/PresenceState'
        trackingAreaList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
          description: "Represents the list of tracking areas that constitutes the area. This IE shall be present if the subscription\
            \ or  the event report is for tracking UE presence in the tracking areas. For non 3GPP access the TAI shall be\
            \ the N3GPP TAI. \n"
        ecgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 1
          description: "Represents the list of EUTRAN cell Ids that constitutes the area. This IE shall be present if the\
            \ Area of Interest subscribed is a list of EUTRAN cell Ids. \n"
        ncgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 1
          description: "Represents the list of NR cell Ids that constitutes the area. This IE shall be present if the Area\
            \ of Interest subscribed is a list of NR cell Ids. \n"
        globalRanNodeIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
          description: "Represents the list of NG RAN node identifiers that constitutes the area. This IE shall be present\
            \ if the Area of Interest subscribed is a list of NG RAN node identifiers. \n"
        globaleNbIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
          description: |
            Represents the list of eNodeB identifiers that constitutes the area. This IE shall be  present if the Area of Interest subscribed is a list of eNodeB identifiers.
      description: |
        If the additionalPraId IE is present, this IE shall state the presence information of the UE for the individual PRA identified by the additionalPraId IE;  If the additionalPraId IE is not present, this IE shall state the presence information of the UE for the PRA identified by the praId IE.
    PresenceInfoRm:
      type: object
      properties:
        praId:
          type: string
          description: "Represents an identifier of the Presence Reporting Area (see clause 28.10 of \n3GPP TS 23.003. This\
            \ IE shall be present  if the Area of Interest subscribed or\nreported is a Presence Reporting Area or a Set of\
            \ Core Network predefined Presence\nReporting Areas. When present, it shall be encoded as a string representing\
            \ an integer\nin the following ranges:\n- 0 to 8 388 607 for UE-dedicated PRA\n- 8 388 608 to 16 777 215 for Core\
            \ Network predefined PRA\nExamples:\nPRA ID 123 is encoded as \"123\"\nPRA ID 11 238 660 is encoded as \"11238660\"\
            \n"
        additionalPraId:
          type: string
          description: |
            This IE may be present if the praId IE is present and if it contains a PRA identifier referring to a set of Core Network predefined Presence Reporting Areas. When present, this IE shall contain a PRA Identifier of an individual PRA within the Set of Core Network predefined Presence Reporting Areas indicated by the praId IE.
        presenceState:
          $ref: '#/components/schemas/PresenceState'
        trackingAreaList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 0
          description: |
            Represents the list of tracking areas that constitutes the area. This IE shall be present if the subscription or the event report  is for tracking UE presence in the tracking areas. For non 3GPP access the TAI shall be the N3GPP TAI.
        ecgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 0
          description: |
            Represents the list of EUTRAN cell Ids that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of EUTRAN cell Ids.
        ncgiList:
          type: array
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 0
          description: |
            Represents the list of NR cell Ids that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of NR cell Ids.
        globalRanNodeIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          description: |
            Represents the list of NG RAN node identifiers that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of NG RAN node identifiers.
        globaleNbIdList:
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
          description: |
            Represents the list of eNodeB identifiers that constitutes the area. This IE shall be present if the Area of Interest subscribed is a list of eNodeB identifiers.
      nullable: true
      description: "This data type is defined in the same way as the 'PresenceInfo' data type, but with the OpenAPI 'nullable:\
        \ true' property.  If the additionalPraId IE is present, this IE shall state the presence information of the UE for\
        \ the individual PRA identified by the additionalPraId IE;  If the additionalPraId IE is not present, this IE shall\
        \ state the presence information of the UE for the PRA identified by the praId IE. \n"
    GlobalRanNodeId:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        n3IwfId:
          $ref: '#/components/schemas/N3IwfId'
        gNbId:
          $ref: '#/components/schemas/GNbId'
        ngeNbId:
          $ref: '#/components/schemas/NgeNbId'
        wagfId:
          $ref: '#/components/schemas/WAgfId'
        tngfId:
          $ref: '#/components/schemas/TngfId'
        nid:
          $ref: '#/components/schemas/Nid'
        eNbId:
          $ref: '#/components/schemas/ENbId'
      description: |
        One of the six attributes n3IwfId, gNbIdm, ngeNbId, wagfId, tngfId, eNbId shall be present.
      required:
      - plmnId
    GNbId:
      description: Provides the G-NB identifier.
      type: object
      properties:
        bitLength:
          type: integer
          minimum: 22
          maximum: 32
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
        gNBValue:
          type: string
          pattern: ^[A-Fa-f0-9]{6,8}$
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
      required:
      - bitLength
      - gNBValue
    AtsssCapability:
      description: |
        Containes Capability to support procedures related to Access Traffic Steering, Switching, Splitting.
      type: object
      properties:
        atsssLL:
          type: boolean
          default: false
          description: |
            Indicates the support of Access Traffic Steering, Switching and Splitting procedures  using the ATSSS-LL steering functionality (see clauses 4.2.10, 5.32 of 3GPP TS 23.501). true: Supported false (default): Not Supported
        mptcp:
          type: boolean
          default: false
          description: |
            Indicates the support of Access Traffic Steering, Switching and Splitting procedures using the MPTCP steering functionality (see clauses 4.2.10, 5.32 of 3GPP TS 23.501 true: Supported false (default): Not Supported
        mpquic:
          type: boolean
          default: false
          description: |
            Indicates the support of Access Traffic Steering, Switching and Splitting procedures  using the MPQUIC-UDP steering functionality (see clauses 4.2.10, 5.32 of 3GPP TS 23.501) true: Supported false (default): Not Supported
        rttWithoutPmf:
          type: boolean
          default: false
          description: |
            This IE is only used by the UPF to indicate whether the UPF supports RTT measurement without PMF (see clauses 5.32.2, 6.3.3.3 of 3GPP TS 23.501 true: Supported false (default): Not Supported
        mpquicIp:
          type: boolean
          default: false
          description: |
            Indicates the support of Access Traffic Steering, Switching and Splitting procedures  using the MPQUIC-IP steering functionality (see clauses 4.2.10, 5.32 of 3GPP TS 23.501) true: Supported false (default): Not Supported
        mpquicE:
          type: boolean
          default: false
          description: |
            Indicates the support of Access Traffic Steering, Switching and Splitting procedures  using the MPQUIC-E steering functionality (see clauses 4.2.10, 5.32 of 3GPP TS 23.501) true: Supported false (default): Not Supported
