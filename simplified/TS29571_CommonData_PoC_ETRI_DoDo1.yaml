    RtpPayloadInfoRm:
      nullable: true
      description: Describes the modifications to the RtpPayloadInfo data type.
      type: object
      properties:
        rtpPayloadTypeList:
          type: array
          nullable: true
          items:
            type: integer
            minimum: 0
            maximum: 127
          minItems: 1
