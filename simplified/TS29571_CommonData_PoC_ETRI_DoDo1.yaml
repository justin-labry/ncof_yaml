          $ref: '#/components/schemas/DateTime'
        endTime:
          $ref: '#/components/schemas/DateTime'
    ReservPriority:
      type: string
      description: Indicates the reservation priority.
    AfAppId:
      description: Contains an AF application identifier.
      type: string
    CodecData:
      description: Contains codec related information.
      type: string
