    AmbrRm:
      anyOf:
      - $ref: '#/components/schemas/Ambr'
      - $ref: '#/components/schemas/NullValue'
      description: |
        This data type is defined in the same way as the 'Ambr' data type, but with the OpenAPI 'nullable: true' property."
    SliceMbr:
