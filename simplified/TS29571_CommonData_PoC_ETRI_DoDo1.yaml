        areaSessionId:
          $ref: '#/components/schemas/AreaSessionId'
        mbsServiceArea:
          $ref: '#/components/schemas/MbsServiceArea'
      required:
      - areaSessionId
      - mbsServiceArea
    MbsServiceInfo:
      description: Represent MBS Service Information.
      type: object
      properties:
        mbsMediaComps:
          description: |
            The key of the map is the "mbsMedCompNum" attribute of the corresponding MbsMediaCompRm data structure provided as a map entry.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MbsMediaCompRm'
          minProperties: 1
        mbsSdfResPrio:
          $ref: '#/components/schemas/ReservPriority'
        afAppId:
          $ref: '#/components/schemas/AfAppId'
        mbsSessionAmbr:
          $ref: '#/components/schemas/BitRate'
      required:
      - mbsMediaComps
    MbsMediaComp:
      description: Represents an MBS Media Component.
      type: object
      properties:
        mbsMedCompNum:
          type: integer
        mbsFlowDescs:
          type: array
          items:
            $ref: SupplementaryData_PoC_ETRI_DoDo1.yaml#/components/schemas/FlowDescription
          minItems: 1
        mbsSdfResPrio:
          $ref: '#/components/schemas/ReservPriority'
        mbsMediaInfo:
          $ref: '#/components/schemas/MbsMediaInfo'
        qosRef:
          type: string
        mbsQoSReq:
          $ref: '#/components/schemas/MbsQoSReq'
      required:
      - mbsMedCompNum
    MbsMediaCompRm:
      description: |
        This data type is defined in the same way as the MbsMediaComp data type, but with the OpenAPI nullable property set to true.
      anyOf:
      - $ref: '#/components/schemas/MbsMediaComp'
      - $ref: '#/components/schemas/NullValue'
    MbsQoSReq:
      description: Represent MBS QoS requirements.
      type: object
      properties:
        5qi:
          $ref: '#/components/schemas/5Qi'
        guarBitRate:
          $ref: '#/components/schemas/BitRate'
        maxBitRate:
          $ref: '#/components/schemas/BitRate'
        averWindow:
          $ref: '#/components/schemas/AverWindow'
        reqMbsArp:
          $ref: '#/components/schemas/Arp'
      required:
      - 5qi
    MbsMediaInfo:
      description: Represent MBS Media Information.
      type: object
      properties:
        mbsMedType:
          $ref: SupplementaryData_PoC_ETRI_DoDo1.yaml#/components/schemas/MediaType
        maxReqMbsBwDl:
          $ref: '#/components/schemas/BitRate'
        minReqMbsBwDl:
          $ref: '#/components/schemas/BitRate'
        codecs:
          type: array
          items:
            $ref: '#/components/schemas/CodecData'
          minItems: 1
          maxItems: 2
    AssociatedSessionId:
      description: an associated Session Id used in MOCN
      anyOf:
      - $ref: '#/components/schemas/Ssm'
      - type: string
    SynchronizationState:
      type: string
      description: Indicates the Synchronization State.
    TimeSource:
      type: string
      description: Indicates the Time Source.
    ClockQualityDetailLevel:
      type: string
      description: Indicates the Clock Quality Detail Level.
    ClockQualityDetailLevelRm:
      description: |
        This data type is defined in the same way as the 'ClockQualityDetailLevel' data type, but with the OpenAPI 'nullable: true' property.
      anyOf:
      - $ref: '#/components/schemas/ClockQualityDetailLevel'
      - $ref: '#/components/schemas/NullValue'
    ClockQualityAcceptanceCriterion:
      description: Contains a Clock Quality Acceptance Criterion.
      type: object
      properties:
        synchronizationState:
          type: array
          items:
            $ref: '#/components/schemas/SynchronizationState'
          minItems: 1
        clockQuality:
          $ref: '#/components/schemas/ClockQuality'
        parentTimeSource:
          type: array
          items:
            $ref: '#/components/schemas/TimeSource'
          minItems: 1
    ClockQualityAcceptanceCriterionRm:
      description: Contains a Clock Quality Acceptance Criterion.
      type: object
      nullable: true
      properties:
        synchronizationState:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SynchronizationState'
          minItems: 1
        clockQuality:
          $ref: '#/components/schemas/ClockQualityRm'
        parentTimeSource:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TimeSource'
          minItems: 1
    ClockQuality:
      description: Contains Clock Quality.
      type: object
      properties:
        traceabilityToGnss:
          type: boolean
        traceabilityToUtc:
          type: boolean
        frequencyStability:
          $ref: '#/components/schemas/Uint16'
        clockAccuracyIndex:
          type: string
          pattern: ^[A-Fa-f0-9]{2}$
        clockAccuracyValue:
          type: integer
          minimum: 1
          maximum: 40000000
    ClockQualityRm:
      description: 'ClockQuality with ''nullable: true'' property'
      type: object
      nullable: true
      properties:
        traceabilityToGnss:
          type: boolean
        traceabilityToUtc:
          type: boolean
        frequencyStability:
          $ref: '#/components/schemas/Uint16Rm'
        clockAccuracyIndex:
          type: string
          nullable: true
          pattern: ^[A-Fa-f0-9]{2}$
        clockAccuracyValue:
          type: integer
          nullable: true
          minimum: 1
          maximum: 40000000
    SessionId:
      description: IMS Session Identifier
      type: string
    Fingerprint:
      description: The certificate fingerprint for the DTLS association.
      type: string
      pattern: ^(SHA-1|SHA-224|SHA-256|SHA-384|SHA-512|MD5|MD2)\s[0-9A-F]{2}(:[0-9A-F]{2})+$
    MediaId:
      description: IMS Media Flow Identifier
      type: string
    MaxMessageSize:
