      maximum: 4095
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501),\
        \ expressed in Bytes. \n"
    Mcc:
      type: string
      pattern: ^\d{3}$
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.\
        \ \n"
    Mnc:
      type: string
      pattern: ^\d{2,3}$
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in  clause 9.3.3.5 of 3GPP\
        \ TS 38.413. \n"
    NfHeartbeatInfo:
      description: NF heart beat information.
      type: object
      properties:
        numOfRetrans:
          $ref: '#/components/schemas/Uinteger'
        hbIntvl:
          $ref: '#/components/schemas/Uinteger'
    NfInstanceId:
      type: string
      format: uuid
      description: "String uniquely identifying a NF instance. The format of the NF Instance ID shall be a  Universally Unique\
        \ Identifier (UUID) version 4. \n"
    NfSignallingInfo:
      description: NF Signalling Information
      type: object
      properties:
        nfSigInfoPerWndw:
          type: array
          items:
            $ref: '#/components/schemas/NfSignallingInfoPerTimeWindow'
          minItems: 1
        avgReqProcTime:
          $ref: '#/components/schemas/Uinteger'
        nfHeartbeatInfo:
          $ref: '#/components/schemas/NfHeartbeatInfo'
        unexpStatusInd:
          type: boolean
          default: false
    NfSignallingInfoPerService:
      description: NF signalling information per service.
      type: object
      properties:
        serviceName:
          $ref: '#/components/schemas/ServiceName'
        numOfReq:
          $ref: '#/components/schemas/Uinteger'
        numOfReqUnresp:
          $ref: '#/components/schemas/Uinteger'
        numOfReqReject:
          $ref: '#/components/schemas/Uinteger'
        numOfRedMessages:
          $ref: '#/components/schemas/Uinteger'
        numOfPosteriorReq:
          $ref: '#/components/schemas/Uinteger'
      required:
      - serviceName
    NfSignallingInfoPerTimeWindow:
      description: NF Signalling Information Per time window
      type: object
      properties:
        tw:
          $ref: '#/components/schemas/TimeWindow'
        nfSigInfoPerService:
          description: |
            The key of the map is the "serviceName" attribute of the NfSignallingInfoPerService data type.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NfSignallingInfoPerService'
          minProperties: 1
      required:
      - tw
      - nfSigInfoPerService
    NgApCause:
      description: Represents the NGAP cause.
      type: object
      properties:
        group:
          $ref: '#/components/schemas/Uinteger'
        value:
          $ref: '#/components/schemas/Uinteger'
      required:
      - group
      - value
    Nid:
      type: string
      pattern: ^[A-Fa-f0-9]{11}$
      description: "This represents the Network Identifier, which together with a PLMN ID is used to identify an SNPN (see\
        \ 3GPP TS 23.003 and 3GPP TS 23.501 clause 5.30.2.1). \n"
    NsmfEventExposureNotification:
      description: Represents notifications on events that occurred.
      type: object
      properties:
        notifId:
          type: string
          description: Notification correlation ID
        eventNotifs:
          type: array
          items:
            $ref: '#/components/schemas/EventNotification'
          minItems: 1
          description: Notifications about Individual Events
        ackUri:
          $ref: '#/components/schemas/Uri'
      required:
      - notifId
      - eventNotifs
    PacketDelBudget:
      type: integer
      minimum: 1
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
    PacketErrRate:
      type: string
      pattern: ^([0-9]E-[0-9])$
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
    PacketLossRate:
      type: integer
      minimum: 0
      maximum: 1000
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
    PduSessionId:
      type: integer
      minimum: 0
      maximum: 255
      description: "Unsigned integer identifying a PDU session, within the range 0 to 255, as specified in  clause 11.2.3.1b,\
        \ bits 1 to 8, of 3GPP TS 24.007. If the PDU Session ID is allocated by the  Core Network for UEs not supporting N1\
        \ mode, reserved range 64 to 95 is used. PDU Session ID  within the reserved range is only visible in the Core Network.\
        \ \n"
    PduSessionInfo:
      description: Represents session information.
      type: object
      properties:
        n4SessId:
          type: string
          description: The identifier of the N4 session for the reported PDU Session.
        sessInactiveTimer:
          $ref: '#/components/schemas/DurationSec'
        pduSessStatus:
          $ref: '#/components/schemas/PduSessionStatus'
    PduSessionInformation:
      description: Represents the PDU session related information.
      type: object
      properties:
        pduSessId:
          $ref: '#/components/schemas/PduSessionId'
        sessInfo:
          $ref: '#/components/schemas/PduSessionInfo'
    PduSessionStatus:
      type: string
      description: "Represents the status of the PDU Session.  \nPossible values are:\n- ACTIVATED: PDU Session status is\
        \ activated.\n- DEACTIVATED: PDU Session status is deactivated."
    PduSessionType:
      type: string
      description: "PduSessionType indicates the type of a PDU session. It shall comply with the provisions defined in table\
        \ 5.4.3.3-1. \n"
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      type: object
      required:
      - mcc
      - mnc
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
        nid:
          $ref: '#/components/schemas/Nid'
    ProblemDetails:
      description: Provides additional information in an error response.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Uri'
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          $ref: '#/components/schemas/Uri'
        cause:
          type: string
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
        invalidParams:
          type: array
          items:
            $ref: '#/components/schemas/InvalidParam'
          minItems: 1
        supportedFeatures:
          $ref: '#/components/schemas/SupportedFeatures'
        nrfId:
          $ref: '#/components/schemas/Fqdn'
        supportedApiVersions:
          type: array
          items:
            type: string
          minItems: 1
    Qfi:
      type: integer
      minimum: 0
      maximum: 63
      description: Unsigned integer identifying a QoS flow, within the range 0 to 63.
    QosPara:
      description: The values of the QoS parameters.
      type: object
      properties:
        qosParamSetId:
          type: string
          description: Identifies the QoS parameter set.
        5qi:
          $ref: '#/components/schemas/5Qi'
        priorityLvl:
          $ref: '#/components/schemas/5QiPriorityLevel'
        rscType:
          $ref: '#/components/schemas/QosResourceType'
        pdb:
          $ref: '#/components/schemas/PacketDelBudget'
        per:
          $ref: '#/components/schemas/PacketErrRate'
        gbrUl:
          $ref: '#/components/schemas/BitRate'
        gbrDl:
          $ref: '#/components/schemas/BitRate'
        mbrUl:
          $ref: '#/components/schemas/BitRate'
        mbrDl:
          $ref: '#/components/schemas/BitRate'
        maxPlrUl:
          $ref: '#/components/schemas/PacketLossRate'
        maxPlrDl:
          $ref: '#/components/schemas/PacketLossRate'
        avgWin:
          $ref: '#/components/schemas/AverWindow'
        maxDataBurstVol:
          $ref: '#/components/schemas/MaxDataBurstVol'
    QosResourceType:
      type: string
      description: "The enumeration QosResourceType indicates whether a QoS Flow is non-GBR, delay critical GBR, or non-delay\
        \ critical GBR (see clauses 5.7.3.4 and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined in\
        \ table 5.5.3.6-1. \n"
    RatType:
      type: string
      description: Indicates the radio access used.
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      type: object
      properties:
        cause:
          type: string
        targetScp:
          $ref: '#/components/schemas/Uri'
        targetSepp:
          $ref: '#/components/schemas/Uri'
    ReferenceId:
      $ref: '#/components/schemas/Uint64'
    RouteInformation:
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
      required:
      - portNumber
      nullable: true
      description: "At least one of the \"ipv4Addr\" attribute and the \"ipv6Addr\" attribute shall be included in the \"\
        RouteInformation\" data type. \n"
    RouteToLocation:
      type: object
      properties:
        dnai:
          $ref: '#/components/schemas/Dnai'
        routeInfo:
          $ref: '#/components/schemas/RouteInformation'
        routeProfId:
          type: string
          nullable: true
          description: Identifies the routing profile Id.
      required:
      - dnai
      anyOf:
      - required:
        - routeInfo
      - required:
        - routeProfId
      nullable: true
      description: |
        At least one of the "routeInfo" attribute and the "routeProfId" attribute shall be included in the "RouteToLocation" data type.
    SatelliteBackhaulCategory:
      type: string
      description: Indicates the satellite backhaul used.
    ServiceName:
      type: string
      description: Service names known to NRF
    SmNasFromSmf:
      description: |
        Represents information on the SM congestion control applied SM NAS messages that SMF sends  to UE for PDU Session.
      type: object
      properties:
        smNasType:
          type: string
        timeStamp:
          $ref: '#/components/schemas/DateTime'
        backoffTimer:
          $ref: '#/components/schemas/DurationSec'
        appliedSmccType:
          $ref: '#/components/schemas/AppliedSmccType'
      required:
      - smNasType
      - timeStamp
      - backoffTimer
      - appliedSmccType
    SmNasFromUe:
      description: |
        Represents information on the SM NAS messages that SMF receives from UE for PDU Session.
      type: object
      properties:
        smNasType:
          type: string
        timeStamp:
          $ref: '#/components/schemas/DateTime'
      required:
      - smNasType
      - timeStamp
    SmfEvent:
      type: string
      description: "Represents the types of events that can be subscribed.  \nPossible values are:\n- AC_TY_CH: Access Type\
        \ Change.\n- UP_PATH_CH: UP Path Change.\n- PDU_SES_REL: PDU Session Release.\n- PLMN_CH: PLMN Change.\n- UE_IP_CH:\
        \ UE IP address change.\n- RAT_TY_CH: RAT Type Change.\n- DDDS: Downlink data delivery status.\n- COMM_FAIL: Communication\
        \ Failure.\n- PDU_SES_EST: PDU Session Establishment.\n- QFI_ALLOC: QFI allocation.\n- QOS_MON: QoS Monitoring.\n\
        - SMCC_EXP: SM congestion control experience for PDU Session.\n- DISPERSION: Session Management transaction dispersion.\n\
        - RED_TRANS_EXP: Redundant transmission experience for PDU Session.\n- WLAN_INFO: WLAN information on PDU session\
        \ for which Access Type is NON_3GPP_ACCESS and\n  RAT Type is TRUSTED_WLAN.\n- UPF_INFO: The UPF information, including\
        \ the UPF ID/address/FQDN information.\n- UP_STATUS_INFO: The User Plane status information.\n- UPF_EVENT: UPF event\
        \ subscribed via SMF.\n- SATB_CH: Satellite backhaul category change.\n- TRAFFIC_CORRELATION: Indicates that the SMF\
        \ provides 5GC determined traffic correlation\n  information for a set of UEs identified by Traffic Correlation ID.\n\
        - TRAFF_ROUTE_REQ_OUTCOME: Indicates the report of the installation outcome of the requested\n  traffic routing requirements.\n\
        - SIM_CONN_FAIL: Indicates that the simultaneous connectivity over the source and the target\n  PDU Session Anchor\
        \ failed to be established during a PDU Session Anchor change.\n- QFI_DEALLOCATION: QFI deallocation.\n- QOS_FLOW_CHANGE:\
        \ QoS flow change.\n- ENERGY_USAGE_DATA: Indicates that the SMF event is the user-plane energy consumption\n  information.\n\
        - SIGNALLING_INFO: Indicates the report of Service Signalling characteristics.\n"
    Snssai:
      type: object
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
          description: "Unsigned integer, within the range 0 to 255, representing the Slice/Service Type.  It indicates the\
            \ expected Network Slice behaviour in terms of features and services. Values 0 to 127 correspond to the standardized\
            \ SST range. Values 128 to 255 correspond  to the Operator-specific range. See clause 28.4.2 of 3GPP TS 23.003.\
            \ Standardized values are defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
        sd:
          type: string
          pattern: ^[A-Fa-f0-9]{6}$
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      required:
      - sst
    SscMode:
      type: string
      description: "represents the service and session continuity mode It shall comply with the provisions defined in table\
        \ 5.4.3.6-1. \n"
    StateTransitionInfo:
      description: Represents session-related state transition information.
      type: object
      properties:
        supi:
          $ref: '#/components/schemas/Supi'
        groupId:
          $ref: '#/components/schemas/GroupId'
        transType:
          $ref: '#/components/schemas/SmfEvent'
        numOfTran:
          $ref: '#/components/schemas/Uinteger'
        pctUes:
          $ref: '#/components/schemas/Uinteger'
      required:
      - transType
      allOf:
      - required:
        - supi
      - anyOf:
        - required:
          - numOfTran
        - required:
          - pctUes
    Supi:
      type: string
      pattern: ^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$
      description: "String identifying a Supi that shall contain either an IMSI, a network specific identifier,\na Global\
        \ Cable Identifier (GCI) or a Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It shall\
        \ be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi> shall be formatted according to clause 2.2\n\
        \   of 3GPP TS 23.003 that describes an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai> shall\
        \ be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
        , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\", where\
        \ <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the value is used as part\
        \ of an URI, the string shall\n   only contain characters allowed according to the \"lower-with-hyphen\" naming convention\n\
        \   defined in 3GPP TS 29.501.\n"
    SupportedFeatures:
      type: string
      pattern: ^[A-Fa-f0-9]*$
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
    TimeWindow:
      description: Represents a time window identified by a start time and a stop time.
      type: object
      properties:
        startTime:
          $ref: '#/components/schemas/DateTime'
        stopTime:
          $ref: '#/components/schemas/DateTime'
      required:
      - startTime
      - stopTime
    TraffRouteReqOutcome:
      description: |
        Represents the installation outcome of the requested traffic routing requirements.
      type: object
      properties:
        succTrafficFlows:
          type: array
          items:
            $ref: '#/components/schemas/FlowDescription'
          minItems: 1
        succEthTrafficFlows:
          type: array
          items:
            $ref: '#/components/schemas/EthFlowDescription'
          minItems: 1
        failedTrafficFlows:
          type: array
          items:
            $ref: '#/components/schemas/FlowDescription'
          minItems: 1
        failedEthTrafficFlows:
          type: array
          items:
            $ref: '#/components/schemas/EthFlowDescription'
          minItems: 1
      allOf:
      - not:
          required:
          - succTrafficFlows
          - succEthTrafficFlows
      - not:
          required:
          - failedTrafficFlows
          - failedEthTrafficFlows
    TrafficCorrelationNotification:
      description: Represents notifications for 5GC determined Traffic Correlation Information.
      type: object
      properties:
        smfId:
          $ref: '#/components/schemas/NfInstanceId'
        tfcCorrId:
          type: string
          description: |
            Identification of a set of UEs accessing the application identified by the  Application Identifier or traffic filtering information.
        dnais:
          type: array
          items:
            $ref: '#/components/schemas/Dnai'
          minItems: 1
        easFqdn:
          $ref: '#/components/schemas/Fqdn'
        easIpAddr:
          $ref: '#/components/schemas/IpAddr'
        pduSessionNbr:
          $ref: '#/components/schemas/Uinteger'
      required:
      - smfId
      - pduSessionNbr
      - tfcCorrId
      anyOf:
      - required:
        - dnais
      - required:
        - easFqdn
    TransactionInfo:
      description: Represents SMF Transaction Information.
      type: object
      properties:
        transaction:
          $ref: '#/components/schemas/Uinteger'
        snssai:
          $ref: '#/components/schemas/Snssai'
        appIds:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationId'
          minItems: 1
        transacMetrics:
          type: array
          items:
            $ref: '#/components/schemas/TransactionMetric'
          minItems: 1
      required:
      - transaction
    TransactionMetric:
      type: string
      description: "Represents the metric on UE Session Management transactions.  \nPossible values are:\n- PDU_SES_EST: PDU\
        \ Session Establishment.\n- PDU_SES_AUTH: PDU Session Authentication.\n- PDU_SES_MODIF: PDU Session Modification.\n\
        - PDU_SES_REL: PDU Session Release\n"
    Uint64:
      type: integer
      minimum: 0
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
    Uinteger:
      type: integer
      minimum: 0
      description: Unsigned Integer, i.e. only value 0 and integers above 0 are permissible.
    UpfInformation:
      description: Represents the ID/address/FQDN of the UPF.
      type: object
      properties:
        upfId:
          type: string
        upfAddr:
          $ref: '#/components/schemas/AddrFqdn'
    Uri:
      type: string
      description: string providing an URI formatted according to IETF RFC 3986.
    VolumeTimedReport:
      description: Contains Usage data information.
      type: object
      properties:
        startTimeStamp:
          $ref: '#/components/schemas/DateTime'
        endTimeStamp:
          $ref: '#/components/schemas/DateTime'
        downlinkVolume:
          $ref: '#/components/schemas/Int64'
        uplinkVolume:
          $ref: '#/components/schemas/Int64'
      required:
      - startTimeStamp
      - endTimeStamp
      - downlinkVolume
      - uplinkVolume
