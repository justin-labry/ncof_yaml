          POINT_ALTITUDE: '#/components/schemas/PointAltitude'
          POINT_ALTITUDE_UNCERTAINTY: '#/components/schemas/PointAltitudeUncertainty'
          ELLIPSOID_ARC: '#/components/schemas/EllipsoidArc'
          LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/Local2dPointUncertaintyEllipse'
          LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID: '#/components/schemas/Local3dPointUncertaintyEllipsoid'
    GNbId:
      description: Provides the G-NB identifier.
      type: object
      properties:
        bitLength:
          type: integer
          minimum: 22
          maximum: 32
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
        gNBValue:
          type: string
          pattern: ^[A-Fa-f0-9]{6,8}$
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
      required:
      - bitLength
      - gNBValue
    Gci:
      type: string
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
    GeoDistributionInfo:
      description: Represents the geographical distribution of the UEs.
      type: object
      properties:
        loc:
          $ref: '#/components/schemas/UserLocation'
        supis:
          type: array
          items:
            $ref: '#/components/schemas/Supi'
          minItems: 1
        gpsis:
          type: array
          items:
            $ref: '#/components/schemas/Gpsi'
          minItems: 1
      required:
      - loc
    GeographicArea:
      description: Geographic area specified by different shape.
      anyOf:
      - $ref: '#/components/schemas/Point'
      - $ref: '#/components/schemas/PointUncertaintyCircle'
      - $ref: '#/components/schemas/PointUncertaintyEllipse'
      - $ref: '#/components/schemas/Polygon'
      - $ref: '#/components/schemas/PointAltitude'
      - $ref: '#/components/schemas/PointAltitudeUncertainty'
      - $ref: '#/components/schemas/EllipsoidArc'
    GeographicalArea:
      description: Contains geographical area information (e.g.a civic address or shapes).
      type: object
      properties:
        civicAddress:
          $ref: '#/components/schemas/CivicAddress'
        shapes:
          $ref: '#/components/schemas/GeographicArea'
    GeographicalCoordinates:
      description: Geographical coordinates.
      type: object
      required:
      - lon
      - lat
      properties:
        lon:
          type: number
          format: double
          minimum: -180
          maximum: 180
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
    GeraLocation:
      type: object
      description: Exactly one of cgi, sai or lai shall be present.
      properties:
        locationNumber:
          type: string
          description: Location number within the PLMN. See 3GPP TS 23.003, clause 4.5.
        cgi:
          $ref: '#/components/schemas/CellGlobalId'
        sai:
          $ref: '#/components/schemas/ServiceAreaId'
        lai:
          $ref: '#/components/schemas/LocationAreaId'
        rai:
          $ref: '#/components/schemas/RoutingAreaId'
        vlrNumber:
          type: string
          description: VLR number. See 3GPP TS 23.003 clause 5.1.
        mscNumber:
          type: string
          description: MSC number. See 3GPP TS 23.003 clause 5.1.
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for  Active Location Retrieval when the UE is in idle mode or after a successful location reporting procedure the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location.See ITU-T Recommendation Q.763 (1999) clause 3.88.2.  Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
    Gli:
      $ref: '#/components/schemas/Bytes'
    GlobalRanNodeId:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        n3IwfId:
          $ref: '#/components/schemas/N3IwfId'
        gNbId:
          $ref: '#/components/schemas/GNbId'
        ngeNbId:
          $ref: '#/components/schemas/NgeNbId'
        wagfId:
          $ref: '#/components/schemas/WAgfId'
        tngfId:
          $ref: '#/components/schemas/TngfId'
        nid:
          $ref: '#/components/schemas/Nid'
        eNbId:
          $ref: '#/components/schemas/ENbId'
      description: |
        One of the six attributes n3IwfId, gNbIdm, ngeNbId, wagfId, tngfId, eNbId shall be present.
      required:
      - plmnId
    Gpsi:
      type: string
      pattern: ^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$
      description: "String identifying a Gpsi shall contain either an External Id or an MSISDN.  It shall be formatted as\
        \ follows -External Identifier= \"extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2 of 3GPP\
        \ TS 23.003 that describes an  External Identifier. \n"
    HfcNId:
      type: string
      maxLength: 6
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
    HfcNodeId:
      description: REpresents the HFC Node Identifer received over NGAP.
      type: object
      required:
      - hfcNId
      properties:
        hfcNId:
          $ref: '#/components/schemas/HfcNId'
    HorizAxesOrientation:
      description: Horizontal axes orientation angle clockwise from northing in 0.1 degrees.
      type: integer
      minimum: 0
      maximum: 3600
    InnerRadius:
      description: Indicates value of the inner radius.
      type: integer
      format: int32
      minimum: 0
      maximum: 327675
    InvalidParam:
      type: object
      properties:
        param:
          type: string
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
        reason:
          type: string
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
      required:
      - param
      description: It contains an invalid parameter and a related description.
    IpAddr:
      description: Contains an IP adresse.
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        ipv6Prefix:
          $ref: '#/components/schemas/Ipv6Prefix'
    IpEthFlowDescription:
      description: Contains the description of an Uplink and/or Downlink Ethernet flow.
      type: object
      properties:
        ipTrafficFilter:
          $ref: '#/components/schemas/FlowDescription'
        ethTrafficFilter:
          $ref: '#/components/schemas/EthFlowDescription'
    Ipv4Addr:
      type: string
      pattern: ^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$
      example: 198.51.100.1
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
    Ipv6Addr:
      type: string
      allOf:
      - pattern: ^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))$
      - pattern: ^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))$
      example: 2001:db8:85a3::8a2e:370:7334
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
    Ipv6Prefix:
      type: string
      allOf:
      - pattern: ^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\/(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))$
      - pattern: ^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\/.+)$
      example: 2001:db8:abcd:12::0/64
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
    LineType:
      type: string
      description: |
        Possible values are:
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
    Local2dPointUncertaintyEllipse:
      description: Local 2D point with uncertainty ellipse
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - localOrigin
        - point
        - uncertaintyEllipse
        - confidence
        properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          confidence:
            $ref: '#/components/schemas/Confidence'
    Local3dPointUncertaintyEllipsoid:
      description: Local 3D point with uncertainty ellipsoid
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - localOrigin
        - point
        - uncertaintyEllipsoid
        - confidence
        properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipsoid:
            $ref: '#/components/schemas/UncertaintyEllipsoid'
          confidence:
            $ref: '#/components/schemas/Confidence'
          vConfidence:
            $ref: '#/components/schemas/Confidence'
    LocalOrigin:
      description: Indicates a Local origin in a reference system
      type: object
      required:
      - coordinateId
      properties:
        coordinateId:
          type: string
        point:
          $ref: '#/components/schemas/GeographicalCoordinates'
        area:
          $ref: '#/components/schemas/GeographicArea'
        horizAxesOrientation:
          $ref: '#/components/schemas/HorizAxesOrientation'
    LocationAreaId:
      description: Contains a Location area identification as defined in 3GPP TS 23.003, clause 4.1.
      type: object
      required:
      - plmnId
      - lac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: ^[A-Fa-f0-9]{4}$
          description: Location Area Code.
    LocationInfo:
      description: Represents UE location information.
      type: object
      properties:
        loc:
          $ref: '#/components/schemas/UserLocation'
        geoLoc:
          $ref: '#/components/schemas/GeographicalArea'
        ratio:
          $ref: '#/components/schemas/SamplingRatio'
        confidence:
          $ref: '#/components/schemas/Uinteger'
        geoDistrInfos:
          type: array
          items:
            $ref: '#/components/schemas/GeoDistributionInfo'
          minItems: 1
        distThreshold:
          $ref: '#/components/schemas/Uinteger'
      required:
      - loc
    MacAddr48:
      type: string
      pattern: ^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
    MatchingDirection:
      type: string
      description: "Represents the matching direction when crossing a threshold.  \nPossible values are:\n- ASCENDING: Threshold\
        \ is crossed in ascending direction.\n- DESCENDING: Threshold is crossed in descending direction.\n- CROSSED: Threshold\
        \ is crossed either in ascending or descending direction.\n"
    MaxDataBurstVol:
      type: integer
      minimum: 1
      maximum: 4095
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501),\
        \ expressed in Bytes. \n"
    Mcc:
      type: string
      pattern: ^\d{3}$
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.\
        \ \n"
    Mnc:
      type: string
      pattern: ^\d{2,3}$
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in  clause 9.3.3.5 of 3GPP\
        \ TS 38.413. \n"
    N3IwfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the N3IWF ID as specified in clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal\
        \ representation. Each character in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most significant  character representing the 4 most significant bits of the N3IWF\
        \ ID shall appear first in the  string, and the character representing the 4 least significant bit of the N3IWF ID\
        \ shall  appear last in the string. \n"
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      type: object
      properties:
        n3gppTai:
          $ref: '#/components/schemas/Tai'
        n3IwfId:
          type: string
          pattern: ^[A-Fa-f0-9]+$
          description: "This IE shall contain the N3IWF identifier received over NGAP and shall be encoded as a  string of\
            \ hexadecimal characters. Each character in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\" or\
            \ \"A\" to \"F\" and shall represent 4 bits. The most significant  character representing the 4 most significant\
            \ bits of the N3IWF ID shall appear first in  the string, and the character representing the 4 least significant\
            \ bit of the N3IWF ID  shall appear last in the string. \n"
        ueIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ueIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        protocol:
          $ref: '#/components/schemas/TransportProtocol'
        tnapId:
          $ref: '#/components/schemas/TnapId'
        twapId:
          $ref: '#/components/schemas/TwapId'
        hfcNodeId:
          $ref: '#/components/schemas/HfcNodeId'
        gli:
          $ref: '#/components/schemas/Gli'
        w5gbanLineType:
          $ref: '#/components/schemas/LineType'
        gci:
          $ref: '#/components/schemas/Gci'
    Ncgi:
      description: Contains the NCGI (NR Cell Global Identity), as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        nrCellId:
          $ref: '#/components/schemas/NrCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - nrCellId
    NcofEvent:
      type: string
      description: "Describes the NCOF Events.  \nPossible values are:\n- SLICE_LOAD_LEVEL: Indicates that the event subscribed\
        \ is load level information of Network\n  Slice.\n- NETWORK_PERFORMANCE: Indicates that the event subscribed is network\
        \ performance\n  information.\n- NF_LOAD: Indicates that the event subscribed is load level and status of one or several\n\
        \  Network Functions.\n- SERVICE_EXPERIENCE: Indicates that the event subscribed is service experience.\n- UE_MOBILITY:\
        \ Indicates that the event subscribed is UE mobility information.\n- UE_COMMUNICATION: Indicates that the event subscribed\
        \ is UE communication information.\n- QOS_SUSTAINABILITY: Indicates that the event subscribed is QoS sustainability.\n\
        - ABNORMAL_BEHAVIOUR: Indicates that the event subscribed is abnormal behaviour.\n- USER_DATA_CONGESTION: Indicates\
        \ that the event subscribed is user data congestion\n  information.\n- NSI_LOAD_LEVEL: Indicates that the event subscribed\
        \ is load level information of Network\n  Slice and the optionally associated Network Slice Instance.\n- DN_PERFORMANCE:\
        \ Indicates that the event subscribed is DN performance information.\n- DISPERSION: Indicates that the event subscribed\
        \ is dispersion information.\n- RED_TRANS_EXP: Indicates that the event subscribed is redundant transmission experience.\n\
        - WLAN_PERFORMANCE: Indicates that the event subscribed is WLAN performance.\n- SM_CONGESTION: Indicates the Session\
        \ Management Congestion Control Experience information\n  for specific DNN and/or S-NSSAI.\n- PFD_DETERMINATION: Indicates\
        \ that the event subscribed is the PFD Determination nformation\n  for known application identifier(s).\n- PDU_SESSION_TRAFFIC:\
        \ Indicates that the event subscribed is the PDU Session traffic\n  information.\n- E2E_DATA_VOL_TRANS_TIME: Indicates\
        \ that the event subscribed is of E2E data volume \n  transfer time.\n- MOVEMENT_BEHAVIOUR: Indicates that the event\
        \ subscribed is the Movement Behaviour\n  information.\n- LOC_ACCURACY: Indicates that the event subscribed is of\
        \ location accuracy.\n- RELATIVE_PROXIMITY: Indicates that the event subscribed is the Relative Proximity\n  information.\n\
        - SIGNALLING_STORM: Indicates that the event subscribed is the Signalling Storm information.\n- QOS_POLICY_ASSIST:\
        \ Indicates that the event subscribed is the QoS and Policy\n  Assistance information.\n"
    NcofFailureCode:
      type: string
      description: "Represents the failure reason.  \nPossible values are:\n- UNAVAILABLE_DATA: Indicates the requested statistics\
        \ information for the event is rejected\n  since necessary data to perform the service is unavailable.\n- BOTH_STAT_PRED_NOT_ALLOWED:\
        \ Indicates the requested analysis information for the event is\n  rejected since the start time is in the past and\
        \ the end time is in the future, which\n  means the NF service consumer requested both statistics and prediction for\
        \ the analytics.\n- PREDICTION_NOT_ALLOWED: Indicates that the request for the prediction of the analytics\n  event\
        \ is not allowed.\n- UNSATISFIED_REQUESTED_ANALYTICS_TIME: Indicates that the requested event is rejected since\n\
        \  the analytics information is not ready when the time indicated by the \"timeAnaNeeded\"\n  attribute (as provided\
        \ during the creation or modification of subscription) is reached.\n- NO_ROAMING_SUPPORT: Indicates that the request\
        \ shall be rejected because roaming analytics\n  or data are required and the NCOF neither supports roaming exchange\
        \ capabilitiy nor can\n  it forward the request to another NCOF.\n- OTHER: Indicates the requested analysis information\
        \ for the event is rejected due to other\n  reasons.\n"
    NetworkAreaInfo:
      description: |
        Describes a network area information in which the NF service consumer requests the number of UEs.
      type: object
      properties:
        ecgis:
          description: Contains a list of E-UTRA cell identities.
          type: array
          items:
            $ref: '#/components/schemas/Ecgi'
          minItems: 1
        ncgis:
          description: Contains a list of NR cell identities.
          type: array
          items:
            $ref: '#/components/schemas/Ncgi'
          minItems: 1
        gRanNodeIds:
          description: Contains a list of NG RAN nodes.
          type: array
          items:
            $ref: '#/components/schemas/GlobalRanNodeId'
          minItems: 1
        tais:
          description: Contains a list of tracking area identities.
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
    NfInstanceId:
      type: string
      format: uuid
      description: "String uniquely identifying a NF instance. The format of the NF Instance ID shall be a  Universally Unique\
        \ Identifier (UUID) version 4. \n"
    NfSetId:
      type: string
      description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
        , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with  <MCC> encoded as defined in clause 5.4.2 (\"\
        Mcc\" data type definition)  <MNC> encoding the Mobile Network Code part of the PLMN, comprising 3 digits. \n  If\
        \ there are only 2 significant digits in the MNC, one \"0\" digit shall be inserted \n  at the left side to fill the\
        \ 3 digits coding of MNC.  Pattern: '^[0-9]{3}$'\n<NFType> encoded as a value defined in Table 6.1.6.3.3-1 of 3GPP\
        \ TS 29.510 but \n  with lower case characters <Set ID> encoded as a string of characters consisting of \n  alphabetic\
        \ characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that \n  shall end with either an alphabetic character\
        \ or a digit. \n"
    NgeNbId:
      type: string
      pattern: ^(MacroNGeNB-[A-Fa-f0-9]{5}|LMacroNGeNB-[A-Fa-f0-9]{6}|SMacroNGeNB-[A-Fa-f0-9]{5})$
      description: "This represents the identifier of the ng-eNB ID as specified in clause 9.3.1.8 of  3GPP TS 38.413. The\
        \ value of the ng-eNB ID shall be encoded in hexadecimal representation.  Each character in the string shall take\
        \ a value of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"F\" and  shall represent 4 bits. The padding 0 shall be\
        \ added to make multiple nibbles, so the most  significant character representing the padding 0 if required together\
        \ with the 4 most  significant bits of the ng-eNB ID shall appear first in the string, and the character  representing\
        \ the 4 least significant bit of the ng-eNB ID (to form a nibble) shall appear last  in the string. \n"
      example: SMacroNGeNB-34B89
    Nid:
      type: string
      pattern: ^[A-Fa-f0-9]{11}$
      description: "This represents the Network Identifier, which together with a PLMN ID is used to identify an SNPN (see\
        \ 3GPP TS 23.003 and 3GPP TS 23.501 clause 5.30.2.1). \n"
    NncofEventsSubscriptionNotification:
      description: Represents an Individual NCOF Event Subscription Notification resource.
      type: object
      properties:
        eventNotifications:
          type: array
          items:
            $ref: '#/components/schemas/EventNotification'
          minItems: 1
          description: Notifications about Individual Events
        subscriptionId:
          type: string
          description: String identifying a subscription to the Nncof_EventsSubscription Service
        notifCorrId:
          type: string
          description: Notification correlation identifier.
        oldSubscriptionId:
          type: string
          description: |
            Subscription ID which was allocated by the source NCOF. This parameter shall be present if the notification is for informing the assignment of a new Subscription Id by the target NCOF.
        resourceUri:
          $ref: '#/components/schemas/Uri'
        termCause:
          $ref: '#/components/schemas/TermCause'
        transEvents:
          type: array
          items:
            $ref: '#/components/schemas/NcofEvent'
          minItems: 1
      required:
      - subscriptionId
    NrCellId:
      type: string
      pattern: ^[A-Fa-f0-9]{9}$
      description: "36-bit string identifying an NR Cell Id as specified in clause 9.3.1.7 of 3GPP TS 38.413,  in hexadecimal\
        \ representation. Each character in the string shall take a value of \"0\" to \"9\",  \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most significant character  representing the 4 most significant bits of the Cell\
        \ Id shall appear first in the string, and  the character representing the 4 least significant bit of the Cell Id\
        \ shall appear last in the  string. \n"
    NrLocation:
      description: Contains the NR user location.
      type: object
      properties:
        tai:
          $ref: '#/components/schemas/Tai'
        ncgi:
          $ref: '#/components/schemas/Ncgi'
        ignoreNcgi:
          type: boolean
          default: false
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode or after a successful  NG-RAN location reporting procedure with the eNB when the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        globalGnbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        ntnTaiInfo:
          $ref: '#/components/schemas/NtnTaiInfo'
      required:
      - tai
      - ncgi
    NsiId:
      description: Contains the Identifier of the selected Network Slice instance
      type: string
    NtnTaiInfo:
      description: Contains NR NTN TAI Information.
      type: object
      required:
      - plmnId
      - tacList
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnIdNid'
        tacList:
          type: array
          items:
            $ref: '#/components/schemas/Tac'
          minItems: 1
        derivedTac:
          $ref: '#/components/schemas/Tac'
    Orientation:
      description: Indicates value of orientation angle.
      type: integer
      minimum: 0
      maximum: 180
    OutputStrategy:
      type: string
      description: "Represents the output strategy used for the analytics reporting.  \nPossible values are:\n- BINARY: Indicates\
        \ that the analytics shall only be reported when the requested level\n  of accuracy is reached within a cycle of periodic\
        \ notification.\n- GRADIENT: Indicates that the analytics shall be reported according with the periodicity\n  irrespective\
        \ of whether the requested level of accuracy has been reached or not.\n"
    PacketDelBudget:
      type: integer
      minimum: 1
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
    PacketErrRate:
      type: string
      pattern: ^([0-9]E-[0-9])$
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
    PacketLossRate:
      type: integer
      minimum: 0
      maximum: 1000
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
    PduSessionInfo:
      description: Represents combination of PDU Session parameter(s) information.
      type: object
      properties:
        pduSessType:
          $ref: '#/components/schemas/PduSessionType'
        sscMode:
          $ref: '#/components/schemas/SscMode'
        accessTypes:
          type: array
          items:
            $ref: '#/components/schemas/AccessType'
          minItems: 1
    PduSessionType:
      type: string
      description: "PduSessionType indicates the type of a PDU session. It shall comply with the provisions defined in table\
        \ 5.4.3.3-1. \n"
    PlmnId:
      description: Represents the identifier of a PLMN.
      type: object
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
      required:
      - mcc
      - mnc
    PlmnIdNid:
      description: |
        Contains the serving core network operator PLMN ID and, for an SNPN, the NID that together with the PLMN ID identifies the SNPN.
      type: object
      required:
      - mcc
      - mnc
      properties:
        mcc:
          $ref: '#/components/schemas/Mcc'
        mnc:
          $ref: '#/components/schemas/Mnc'
        nid:
          $ref: '#/components/schemas/Nid'
    Point:
      description: Ellipsoid Point.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - point
        properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
    PointAltitude:
      description: Ellipsoid point with altitude.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - point
        - altitude
        properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          altitude:
            $ref: '#/components/schemas/Altitude'
    PointAltitudeUncertainty:
      description: Ellipsoid point with altitude and uncertainty ellipsoid.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - point
        - altitude
        - uncertaintyEllipse
        - uncertaintyAltitude
        - confidence
        properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          altitude:
            $ref: '#/components/schemas/Altitude'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          uncertaintyAltitude:
            $ref: '#/components/schemas/Uncertainty'
          confidence:
            $ref: '#/components/schemas/Confidence'
          vConfidence:
            $ref: '#/components/schemas/Confidence'
    PointList:
      description: List of points.
      type: array
      items:
        $ref: '#/components/schemas/GeographicalCoordinates'
      minItems: 3
      maxItems: 15
    PointUncertaintyCircle:
      description: Ellipsoid point with uncertainty circle.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - point
        - uncertainty
        properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          uncertainty:
            $ref: '#/components/schemas/Uncertainty'
    PointUncertaintyEllipse:
      description: Ellipsoid point with uncertainty ellipse.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - point
        - uncertaintyEllipse
        - confidence
        properties:
          point:
            $ref: '#/components/schemas/GeographicalCoordinates'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          confidence:
            $ref: '#/components/schemas/Confidence'
    Polygon:
      description: Polygon.
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - pointList
        properties:
          pointList:
            $ref: '#/components/schemas/PointList'
    ProblemDetails:
      description: Provides additional information in an error response.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Uri'
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
        instance:
          $ref: '#/components/schemas/Uri'
        cause:
          type: string
          description: |
            A machine-readable application error cause specific to this occurrence of the problem.  This IE should be present and provide application-related error information, if available.
        invalidParams:
          type: array
          items:
            $ref: '#/components/schemas/InvalidParam'
          minItems: 1
        supportedFeatures:
          $ref: '#/components/schemas/SupportedFeatures'
        nrfId:
          $ref: '#/components/schemas/Fqdn'
        supportedApiVersions:
          type: array
          items:
            type: string
          minItems: 1
    QosPara:
      description: The values of the QoS parameters.
      type: object
      properties:
        qosParamSetId:
          type: string
          description: Identifies the QoS parameter set.
        5qi:
          $ref: '#/components/schemas/5Qi'
        priorityLvl:
          $ref: '#/components/schemas/5QiPriorityLevel'
        rscType:
          $ref: '#/components/schemas/QosResourceType'
        pdb:
          $ref: '#/components/schemas/PacketDelBudget'
        per:
          $ref: '#/components/schemas/PacketErrRate'
        gbrUl:
          $ref: '#/components/schemas/BitRate'
        gbrDl:
          $ref: '#/components/schemas/BitRate'
        mbrUl:
          $ref: '#/components/schemas/BitRate'
        mbrDl:
          $ref: '#/components/schemas/BitRate'
        maxPlrUl:
          $ref: '#/components/schemas/PacketLossRate'
        maxPlrDl:
          $ref: '#/components/schemas/PacketLossRate'
        avgWin:
          $ref: '#/components/schemas/AverWindow'
        maxDataBurstVol:
          $ref: '#/components/schemas/MaxDataBurstVol'
    QosPolicyAssistInfo:
      description: The QoS and policy assistance analytics information.
      type: object
      properties:
        qosPolAssistInfo:
          type: array
          items:
            $ref: '#/components/schemas/QosPolicyAssistSetsPerTS'
          minItems: 1
          description: The QoS and policy assistance information.
    QosPolicyAssistSet:
      description: The QoS and policy assistance parameter set.
      type: object
      properties:
        qosParamSet:
          $ref: '#/components/schemas/QosPara'
        dnn:
          $ref: '#/components/schemas/Dnn'
        appId:
          $ref: '#/components/schemas/ApplicationId'
        fDescs:
          type: array
          items:
            $ref: '#/components/schemas/IpEthFlowDescription'
          minItems: 1
        appDuration:
          $ref: '#/components/schemas/DurationSec'
        predictedAvgQoe:
          $ref: '#/components/schemas/Float'
        predictedMaxQoe:
          $ref: '#/components/schemas/Float'
        predictedMinQoe:
          $ref: '#/components/schemas/Float'
        predQoeVariance:
          $ref: '#/components/schemas/Float'
        qosPolTimeWin:
          $ref: '#/components/schemas/TimeWindow'
        freqs:
          type: array
          items:
            $ref: '#/components/schemas/ArfcnValueNR'
          minItems: 1
        ratTypes:
          type: array
          items:
            $ref: '#/components/schemas/RatType'
          minItems: 1
        validityPeriod:
          $ref: '#/components/schemas/TimeWindow'
        spatialValidity:
          $ref: '#/components/schemas/NetworkAreaInfo'
        maxQoSFlowUsgDur:
          $ref: '#/components/schemas/DurationSec'
        minQoSFlowUsgDur:
          $ref: '#/components/schemas/DurationSec'
        avgQoSFlowUsgDur:
          $ref: '#/components/schemas/DurationSec'
        qosFlowUsgNumber:
          $ref: '#/components/schemas/Uinteger'
      anyOf:
      - required:
        - predictedAvgQoe
      - required:
        - predictedMaxQoe
      - required:
        - predictedMinQoe
      - required:
        - predQoeVariance
    QosPolicyAssistSetsPerTS:
      description: The QoS and policy assistance parameter sets per Time Slot.
      type: object
      properties:
        tsStart:
          $ref: '#/components/schemas/DateTime'
        tsDuration:
          $ref: '#/components/schemas/DurationSec'
        qosPolAssistSets:
          type: array
          items:
            $ref: '#/components/schemas/QosPolicyAssistSet'
          minItems: 1
        confidence:
          $ref: '#/components/schemas/Uinteger'
        _optScore:
          $ref: '#/components/schemas/Float'
      required:
      - tsStart
      - tsDuration
      - qosPolAssistSets
    QosResourceType:
      type: string
      description: "The enumeration QosResourceType indicates whether a QoS Flow is non-GBR, delay critical GBR, or non-delay\
        \ critical GBR (see clauses 5.7.3.4 and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined in\
        \ table 5.5.3.6-1. \n"
    RatFreqInformation:
      description: Represents the RAT type and/or Frequency information.
      type: object
      properties:
        allFreq:
          type: boolean
          description: |
            Set to "true" to indicate to handle all the frequencies the NCOF received, otherwise set to "false" or omit. The "allFreq" attribute and the "freq" attribute are mutually exclusive.
        allRat:
          type: boolean
          description: |
            Set to "true" to indicate to handle all the RAT Types the NCOF received, otherwise set to "false" or omit. The "allRat" attribute and the "ratType" attribute are mutually exclusive.
        freq:
          $ref: '#/components/schemas/ArfcnValueNR'
        ratType:
          $ref: '#/components/schemas/RatType'
        svcExpThreshold:
          $ref: '#/components/schemas/ThresholdLevel'
        matchingDir:
          $ref: '#/components/schemas/MatchingDirection'
    RatType:
      type: string
      description: Indicates the radio access used.
    RedirectResponse:
      description: |
        The response shall include a Location header field containing a different URI  (pointing to a different URI of an other service instance), or the same URI if a request  is redirected to the same target resource via a different SCP.
      type: object
      properties:
        cause:
          type: string
        targetScp:
          $ref: '#/components/schemas/Uri'
        targetSepp:
          $ref: '#/components/schemas/Uri'
    RelativeCartesianLocation:
      description: Relative Cartesian Location
      type: object
      required:
      - x
      - y
      properties:
        x:
          $ref: '#/components/schemas/Float'
        y:
          $ref: '#/components/schemas/Float'
        z:
          $ref: '#/components/schemas/Float'
    RoutingAreaId:
      description: Contains a Routing Area Identification as defined in 3GPP TS 23.003, clause 4.2.
      type: object
      required:
      - plmnId
      - lac
      - rac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: ^[A-Fa-f0-9]{4}$
          description: Location Area Code
        rac:
          type: string
          pattern: ^[A-Fa-f0-9]{2}$
          description: Routing Area Code
    SamplingRatio:
      type: integer
      minimum: 1
      maximum: 100
      description: "Unsigned integer indicating Sampling Ratio (see clauses 4.15.1 of 3GPP TS 23.502), expressed in percent.\
        \ \n"
    ServiceAreaId:
      description: Contains a Service Area Identifier as defined in 3GPP TS 23.003, clause 12.5.
      type: object
      required:
      - plmnId
      - lac
      - sac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: ^[A-Fa-f0-9]{4}$
          description: Location Area Code.
        sac:
          type: string
          pattern: ^[A-Fa-f0-9]{4}$
          description: Service Area Code.
    ServiceExperienceInfo:
      description: Represents service experience information.
      type: object
      properties:
        svcExprc:
          $ref: '#/components/schemas/SvcExperience'
        svcExprcVariance:
          $ref: '#/components/schemas/Float'
        supis:
          type: array
          items:
            $ref: '#/components/schemas/Supi'
          minItems: 1
        snssai:
          $ref: '#/components/schemas/Snssai'
        appId:
          $ref: '#/components/schemas/ApplicationId'
        srvExpcType:
          $ref: '#/components/schemas/ServiceExperienceType'
        ueLocs:
          type: array
          items:
            $ref: '#/components/schemas/LocationInfo'
          minItems: 1
        upfInfo:
          $ref: '#/components/schemas/UpfInformation'
        dnai:
          $ref: '#/components/schemas/Dnai'
        appServerInst:
          $ref: '#/components/schemas/AddrFqdn'
        confidence:
          $ref: '#/components/schemas/Uinteger'
        dnn:
          $ref: '#/components/schemas/Dnn'
        networkArea:
          $ref: '#/components/schemas/NetworkAreaInfo'
        nsiId:
          $ref: '#/components/schemas/NsiId'
        ratio:
          $ref: '#/components/schemas/SamplingRatio'
        ratFreq:
          $ref: '#/components/schemas/RatFreqInformation'
        pduSesInfo:
          $ref: '#/components/schemas/PduSessionInfo'
      required:
      - svcExprc
    ServiceExperienceType:
      type: string
      description: "Represents the type of the service experience analytics.  \nPossible values are:  \n- VOICE: Indicates\
        \ that the service experience analytics is for voice service.\n- VIDEO: Indicates that the service experience analytics\
        \ is for video service.\n- OTHER: Indicates that the service experience analytics is for other service.\n"
    Snssai:
      type: object
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
          description: "Unsigned integer, within the range 0 to 255, representing the Slice/Service Type.  It indicates the\
            \ expected Network Slice behaviour in terms of features and services. Values 0 to 127 correspond to the standardized\
            \ SST range. Values 128 to 255 correspond  to the Operator-specific range. See clause 28.4.2 of 3GPP TS 23.003.\
            \ Standardized values are defined in clause 5.15.2.2 of 3GPP TS 23.501. \n"
        sd:
          type: string
          pattern: ^[A-Fa-f0-9]{6}$
          description: |
            3-octet string, representing the Slice Differentiator, in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The most significant character representing the 4 most significant bits of the SD shall appear first in the string, and the character representing the 4 least significant bit of the SD shall appear last in the string. This is an optional parameter that complements the Slice/Service type(s) to allow to  differentiate amongst multiple Network Slices of the same Slice/Service type. This IE shall be absent if no SD value is associated with the SST.
      description: |
        When Snssai needs to be converted to string (e.g. when used in maps as key), the string shall be composed of one to three digits "sst" optionally followed by "-" and 6 hexadecimal digits "sd".
      required:
      - sst
    SscMode:
      type: string
      description: "represents the service and session continuity mode It shall comply with the provisions defined in table\
        \ 5.4.3.6-1. \n"
    Supi:
      type: string
      pattern: ^(imsi-[0-9]{5,15}|nai-.+|gci-.+|gli-.+|.+)$
      description: "String identifying a Supi that shall contain either an IMSI, a network specific identifier,\na Global\
        \ Cable Identifier (GCI) or a Global Line Identifier (GLI) as specified in clause \n2.2A of 3GPP TS 23.003. It shall\
        \ be formatted as follows\n - for an IMSI \"imsi-<imsi>\", where <imsi> shall be formatted according to clause 2.2\n\
        \   of 3GPP TS 23.003 that describes an IMSI.\n - for a network specific identifier \"nai-<nai>, where <nai> shall\
        \ be formatted\n   according to clause 28.7.2 of 3GPP TS 23.003 that describes an NAI.\n - for a GCI \"gci-<gci>\"\
        , where <gci> shall be formatted according to clause 28.15.2\n   of 3GPP TS 23.003.\n - for a GLI \"gli-<gli>\", where\
        \ <gli> shall be formatted according to clause 28.16.2 of\n   3GPP TS 23.003.To enable that the value is used as part\
        \ of an URI, the string shall\n   only contain characters allowed according to the \"lower-with-hyphen\" naming convention\n\
        \   defined in 3GPP TS 29.501.\n"
    SupportedFeatures:
      type: string
      pattern: ^[A-Fa-f0-9]*$
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
    SupportedGADShapes:
      type: string
      description: Indicates supported GAD shapes.
    SvcExperience:
      description: Contains a mean opinion score with the customized range.
      type: object
      properties:
        mos:
          $ref: '#/components/schemas/Float'
        upperRange:
          $ref: '#/components/schemas/Float'
        lowerRange:
          $ref: '#/components/schemas/Float'
    Tac:
      type: string
      pattern: (^[A-Fa-f0-9]{4}$)|(^[A-Fa-f0-9]{6}$)
      description: "2 or 3-octet string identifying a tracking area code as specified in clause 9.3.3.10  of 3GPP TS 38.413,\
        \ in hexadecimal representation. Each character in the string shall  take a value of \"0\" to \"9\", \"a\" to \"f\"\
        \ or \"A\" to \"F\" and shall represent 4 bits. The most significant character representing the 4 most significant\
        \ bits of the TAC shall  appear first in the string, and the character representing the 4 least significant bit  of\
        \ the TAC shall appear last in the string. \n"
    Tai:
      description: Contains the tracking area identity as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        tac:
          $ref: '#/components/schemas/Tac'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - tac
    TermCause:
      type: string
      description: "Represents the cause for the analytics subscription termination request.  \nPossible values are:  \n \
        \ - USER_CONSENT_REVOKED: The user consent has been revoked.\n  - NCOF_OVERLOAD: The NCOF is overloaded.\n  - UE_LEFT_AREA:\
        \ The UE has moved out of the NCOF serving area.\n"
    ThresholdLevel:
      description: Represents a threshold level.
      type: object
      properties:
        congLevel:
          type: integer
        nfLoadLevel:
          type: integer
        nfCpuUsage:
          type: integer
        nfMemoryUsage:
          type: integer
        nfStorageUsage:
          type: integer
        avgTrafficRate:
          $ref: '#/components/schemas/BitRate'
        maxTrafficRate:
          $ref: '#/components/schemas/BitRate'
        minTrafficRate:
          $ref: '#/components/schemas/BitRate'
        aggTrafficRate:
          $ref: '#/components/schemas/BitRate'
        varTrafficRate:
          $ref: '#/components/schemas/Float'
        avgPacketDelay:
          $ref: '#/components/schemas/PacketDelBudget'
        maxPacketDelay:
          $ref: '#/components/schemas/PacketDelBudget'
        varPacketDelay:
          $ref: '#/components/schemas/Float'
        avgPacketLossRate:
          $ref: '#/components/schemas/PacketLossRate'
        maxPacketLossRate:
          $ref: '#/components/schemas/PacketLossRate'
        varPacketLossRate:
          $ref: '#/components/schemas/Float'
        svcExpLevel:
          $ref: '#/components/schemas/Float'
        speed:
          $ref: '#/components/schemas/Float'
    TimeWindow:
      description: Represents a time window identified by a start time and a stop time.
      type: object
      properties:
        startTime:
          $ref: '#/components/schemas/DateTime'
        stopTime:
          $ref: '#/components/schemas/DateTime'
      required:
      - startTime
      - stopTime
    TnapId:
      description: Contain the TNAP Identifier see clause5.6.2 of 3GPP TS 23.501.
      type: object
      properties:
        ssId:
          type: string
          description: "This IE shall be present if the UE is accessing the 5GC via a trusted WLAN access network.When present,\
            \ it shall contain the SSID of the access point to which the UE is attached, that is received over NGAP,  see\
            \ IEEE Std 802.11-2012. \n"
        bssId:
          type: string
          description: "When present, it shall contain the BSSID of the access point to which the UE is attached, that is\
            \ received over NGAP, see IEEE Std 802.11-2012. \n"
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    TngfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the TNGF ID as specified in clause 9.3.1.161 of  3GPP TS 38.413  in\
        \ hexadecimal representation. Each character in the string shall take a value of \"0\" to \"9\", \"a\"  to \"f\" or\
        \ \"A\" to \"F\" and shall represent 4 bits. The most significant character representing the  4 most significant bits\
        \ of the TNGF ID shall appear first in the string, and the character  representing the 4 least significant bit of\
        \ the TNGF ID shall appear last in the string. \n"
    TrafficInformation:
      description: Traffic information including UL/DL data rate and/or Traffic volume.
      type: object
      properties:
        uplinkRate:
          $ref: '#/components/schemas/BitRate'
        downlinkRate:
          $ref: '#/components/schemas/BitRate'
        uplinkVolume:
          $ref: '#/components/schemas/Volume'
        downlinkVolume:
          $ref: '#/components/schemas/Volume'
        totalVolume:
          $ref: '#/components/schemas/Volume'
      anyOf:
      - required:
        - uplinkRate
      - required:
        - downlinkRate
      - required:
        - uplinkVolume
      - required:
        - downlinkVolume
      - required:
        - totalVolume
    TransportProtocol:
      type: string
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission Control Protocol. \n"
    TwapId:
      description: |
        Contain the TWAP Identifier as defined in clause 4.2.8.5.3 of 3GPP TS 23.501 or the WLAN location information as defined in clause 4.5.7.2.8 of 3GPP TS 23.402.
      type: object
      required:
      - ssId
      properties:
        ssId:
          type: string
          description: "This IE shall contain the SSID of the access point to which the UE is attached, that is received over\
            \ NGAP, see IEEE Std 802.11-2012. \n"
        bssId:
          type: string
          description: "When present, it shall contain the BSSID of the access point to which the UE is attached, for trusted\
            \ WLAN access, see IEEE Std 802.11-2012. \n"
        civicAddress:
          $ref: '#/components/schemas/Bytes'
    Uinteger:
      type: integer
      minimum: 0
      description: Unsigned Integer, i.e. only value 0 and integers above 0 are permissible.
    Uncertainty:
      description: Indicates value of uncertainty.
      type: number
      format: float
      minimum: 0
    UncertaintyEllipse:
      description: Ellipse with uncertainty.
      type: object
      required:
      - semiMajor
      - semiMinor
      - orientationMajor
      properties:
        semiMajor:
          $ref: '#/components/schemas/Uncertainty'
        semiMinor:
          $ref: '#/components/schemas/Uncertainty'
        orientationMajor:
          $ref: '#/components/schemas/Orientation'
    UncertaintyEllipsoid:
      description: Ellipsoid with uncertainty
      type: object
      required:
      - semiMajor
      - semiMinor
      - vertical
      - orientationMajor
      properties:
        semiMajor:
          $ref: '#/components/schemas/Uncertainty'
        semiMinor:
          $ref: '#/components/schemas/Uncertainty'
        vertical:
          $ref: '#/components/schemas/Uncertainty'
        orientationMajor:
          $ref: '#/components/schemas/Orientation'
    UpfInformation:
      description: Represents the ID/address/FQDN of the UPF.
      type: object
      properties:
        upfId:
          type: string
        upfAddr:
          $ref: '#/components/schemas/AddrFqdn'
    Uri:
      type: string
      description: string providing an URI formatted according to IETF RFC 3986.
    UserLocation:
      type: object
      properties:
        eutraLocation:
          $ref: '#/components/schemas/EutraLocation'
        nrLocation:
          $ref: '#/components/schemas/NrLocation'
        n3gaLocation:
          $ref: '#/components/schemas/N3gaLocation'
        utraLocation:
          $ref: '#/components/schemas/UtraLocation'
        geraLocation:
          $ref: '#/components/schemas/GeraLocation'
      description: |
        At least one of eutraLocation, nrLocation and n3gaLocation shall be present. Several of them may be present.
    UtraLocation:
      type: object
      description: Exactly one of cgi, sai or lai shall be present.
      properties:
        cgi:
          $ref: '#/components/schemas/CellGlobalId'
        sai:
          $ref: '#/components/schemas/ServiceAreaId'
        lai:
          $ref: '#/components/schemas/LocationAreaId'
        rai:
          $ref: '#/components/schemas/RoutingAreaId'
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station.  Value "0" indicates that the location information was obtained after a successful paging procedure for Active Location Retrieval when the UE is in idle mode
             or after a successful location reporting procedure the UE is in connected mode. Any
            other value than "0" indicates that the location information is the last known one.  See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
    Volume:
      type: integer
      format: int64
      minimum: 0
      description: Unsigned integer identifying a volume in units of bytes.
    WAgfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the W-AGF ID as specified in clause 9.3.1.162 of  3GPP TS 38.413 in\
        \ hexadecimal representation. Each character in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or\
        \ \"A\" to \"F\" and shall represent 4 bits. The most significant  character representing the 4 most significant bits\
        \ of the W-AGF ID shall appear first in the  string, and the character representing the 4 least significant bit of\
        \ the W-AGF ID shall  appear last in the string. \n"
    WlanPerSsIdPerformanceInfo:
      description: The WLAN performance per SSID.
      type: object
      properties:
        ssId:
          type: string
        wlanPerTsInfos:
          type: array
          items:
            $ref: '#/components/schemas/WlanPerTsPerformanceInfo'
          minItems: 1
      required:
      - ssId
      - wlanPerTsInfos
    WlanPerTsPerformanceInfo:
      description: WLAN performance information per Time Slot during the analytics target period.
      type: object
      properties:
        tsStart:
          $ref: '#/components/schemas/DateTime'
        tsDuration:
          $ref: '#/components/schemas/DurationSec'
        rssi:
          type: integer
        rtt:
          $ref: '#/components/schemas/Uinteger'
        trafficInfo:
          $ref: '#/components/schemas/TrafficInformation'
        numberOfUes:
          $ref: '#/components/schemas/Uinteger'
        confidence:
          $ref: '#/components/schemas/Uinteger'
      required:
      - tsStart
      - tsDuration
      anyOf:
      - required:
        - rssi
      - required:
        - rtt
      - required:
        - trafficInfo
      - required:
        - numberOfUes
    WlanPerUeIdPerformanceInfo:
      description: The WLAN performance per UE ID.
      type: object
      properties:
        supi:
          $ref: '#/components/schemas/Supi'
        gpsi:
          $ref: '#/components/schemas/Gpsi'
        wlanPerTsInfos:
          type: array
          items:
            $ref: '#/components/schemas/WlanPerTsPerformanceInfo'
          minItems: 1
          description: |
            WLAN performance information per Time Slot during the analytics target period.
      required:
      - wlanPerTsInfos
    WlanPerformanceInfo:
      description: The WLAN performance related information.
      type: object
      properties:
        networkArea:
          $ref: '#/components/schemas/NetworkAreaInfo'
        wlanPerSsidInfos:
          type: array
          items:
            $ref: '#/components/schemas/WlanPerSsIdPerformanceInfo'
          minItems: 1
        wlanPerUeIdInfos:
          type: array
          items:
            $ref: '#/components/schemas/WlanPerUeIdPerformanceInfo'
          minItems: 1
          description: |
            WLAN performance information for UE Id(s) of WLAN access points deployed in the Area of Interest.
      required:
      - wlanPerSsidInfos
    _CellPowerCtrlInfo:
      description: The cell power control information.
      type: object
      properties:
        _cellPowerCtrlInfos:
          type: array
          items:
            $ref: '#/components/schemas/_CellPowerParamSetsPerTS'
          minItems: 1
          description: The cell power control information.
    _CellPowerPara:
      description: The values of the cell power parameters.
      type: object
      properties:
        _paramSetId:
          type: string
          description: Identifies the QoS parameter set.
        _cellPowerState:
          $ref: '#/components/schemas/_CellPowerState'
        _cellTxPower:
          $ref: '#/components/schemas/Float'
        _ssPbchBlockPower:
          $ref: '#/components/schemas/Float'
        _siBlockPower:
          $ref: '#/components/schemas/Float'
        _pdschBlockPower:
          $ref: '#/components/schemas/Float'
        _pdcchBlockPower:
          $ref: '#/components/schemas/Float'
        _csiRsPowerOffset:
          $ref: '#/components/schemas/Float'
        _qRxLevMin:
          $ref: '#/components/schemas/Float'
        _cellIndividualOffset:
          $ref: '#/components/schemas/Float'
    _CellPowerParamSet:
      description: The cell power parameter set.
      type: object
      properties:
        _cellPowerParamSet:
          $ref: '#/components/schemas/_CellPowerPara'
        _ctrlTimeWin:
          $ref: '#/components/schemas/TimeWindow'
        _freqs:
          type: array
          items:
            $ref: '#/components/schemas/ArfcnValueNR'
          minItems: 1
        _ratTypes:
          type: array
          items:
            $ref: '#/components/schemas/RatType'
          minItems: 1
        _validityPeriod:
          $ref: '#/components/schemas/TimeWindow'
        _spatialValidity:
          $ref: '#/components/schemas/NetworkAreaInfo'
    _CellPowerParamSetsPerTS:
      description: The QoS and policy assistance parameter sets per Time Slot.
      type: object
      properties:
        _tsStart:
          $ref: '#/components/schemas/DateTime'
        _tsDuration:
          $ref: '#/components/schemas/DurationSec'
        _ratFreq:
          $ref: '#/components/schemas/RatFreqInformation'
        _confidence:
          $ref: '#/components/schemas/Uinteger'
        _optScore:
          $ref: '#/components/schemas/Float'
        _cellPowerParamSets:
          type: array
          items:
            $ref: '#/components/schemas/_CellPowerParamSet'
          minItems: 1
      required:
      - tsStart
      - tsDuration
      - _cellPowerParamSets
    _CellPowerState:
      type: string
      description: "Represents the preferred power state of cell.  \nPossible values are:\n- ACTIVE.\n- ACTIVE_UL.\n- ACTIVE_DL.\n\
        - MICRO_SLEEP.\n- LIGHT_SLEEP. \n- DEEP_SLEEP.\n"
