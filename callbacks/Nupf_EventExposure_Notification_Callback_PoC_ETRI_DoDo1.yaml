      pattern: ^[A-Fa-f0-9]*$
      description: |
        A string used to indicate the features supported by an API that is used as defined in clause  6.6 in 3GPP TS 29.500. The string shall contain a bitmask indicating supported features in  hexadecimal representation Each character in the string shall take a value of "0" to "9",  "a" to "f" or "A" to "F" and shall represent the support of 4 features as described in  table 5.2.2-3. The most significant character representing the highest-numbered features shall  appear first in the string, and the character representing features 1 to 4 shall appear last  in the string. The list of features and their numbering (starting with 1) are defined  separately for each API. If the string contains a lower number of characters than there are  defined features for an API, all features that would be represented by characters that are not  present in the string are not supported.
    TerminationCause:
      type: string
      description: the reason to terminate the subscription
    ThroughputMeasurement:
      description: Throughput Measurement information
      type: object
      properties:
        ulThroughput:
          $ref: '#/components/schemas/BitRate'
        dlThroughput:
          $ref: '#/components/schemas/BitRate'
        ulPacketThroughput:
          $ref: '#/components/schemas/PacketRate'
        dlPacketThroughput:
          $ref: '#/components/schemas/PacketRate'
    ThroughputStatisticsMeasurement:
      description: Throughput Statistics Measurement
      type: object
      properties:
        ulAverageThroughput:
          $ref: '#/components/schemas/BitRate'
        dlAverageThroughput:
          $ref: '#/components/schemas/BitRate'
        ulPeakThroughput:
          $ref: '#/components/schemas/BitRate'
        dlPeakThroughPut:
          $ref: '#/components/schemas/BitRate'
        ulAveragePacketThroughput:
          $ref: '#/components/schemas/PacketRate'
        dlAveragePacketThroughput:
          $ref: '#/components/schemas/PacketRate'
        ulPeakPacketThroughput:
          $ref: '#/components/schemas/PacketRate'
        dlPeakPacketThroughput:
          $ref: '#/components/schemas/PacketRate'
    TrafficVolume:
      type: string
      pattern: ^\d+(\.\d+)? (B|kB|MB|GB|TB)$
      description: |
        String representing a Traffic Volume measured in bytes; the prefixes follow the symbols from The International System of Units, and represent x1000 multipliers.
    TransportProtocol:
      type: string
      description: "Possible values are:\n- UDP: User Datagram Protocol.\n- TCP: Transmission Control Protocol. \n"
    TscManagementInfo:
      description: TSC Management Information
      type: object
      properties:
        pmics:
          type: array
          items:
            $ref: '#/components/schemas/PortManagementContainer'
          minItems: 1
        umic:
          $ref: '#/components/schemas/BridgeManagementContainer'
    TsnPortNumber:
      $ref: '#/components/schemas/Uinteger'
    UeNatMappingInfo:
      description: UE NAT Mapping Information
      type: object
      properties:
        natMappingList:
          type: array
          items:
            $ref: '#/components/schemas/NatMapping'
      required:
      - natMappingList
    Uint16:
      type: integer
      minimum: 0
      maximum: 65535
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
    Uint32:
      type: integer
      minimum: 0
      maximum: 4294967295
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
    Uint64:
      type: integer
      minimum: 0
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 64-bit integer.
    Uinteger:
      type: integer
      minimum: 0
      description: Unsigned Integer, i.e. only value 0 and integers above 0 are permissible.
    Uri:
      type: string
      description: String providing an URI formatted according to RFC 3986.
    UserDataUsageMeasurements:
      description: |
        User Data Usage Measurements either for the PDU session, or the app-id, or the data flow
      type: object
      properties:
        appId:
          $ref: '#/components/schemas/ApplicationId'
        flowInfo:
          $ref: '#/components/schemas/FlowInformation'
        volumeMeasurement:
          $ref: '#/components/schemas/VolumeMeasurement'
        throughputMeasurement:
          $ref: '#/components/schemas/ThroughputMeasurement'
        applicationRelatedInformation:
          $ref: '#/components/schemas/ApplicationRelatedInformation'
        throughputStatisticsMeasurement:
          $ref: '#/components/schemas/ThroughputStatisticsMeasurement'
    VolumeMeasurement:
      description: Volume Measurement information
      type: object
      properties:
        totalVolume:
          $ref: '#/components/schemas/TrafficVolume'
        ulVolume:
          $ref: '#/components/schemas/TrafficVolume'
        dlVolume:
          $ref: '#/components/schemas/TrafficVolume'
        totalNbOfPackets:
          $ref: '#/components/schemas/Uint64'
        ulNbOfPackets:
          $ref: '#/components/schemas/Uint64'
        dlNbOfPackets:
          $ref: '#/components/schemas/Uint64'
