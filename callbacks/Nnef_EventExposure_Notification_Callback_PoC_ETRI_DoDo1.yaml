            $ref: '#/components/schemas/ConsumptionReportingUnitsCollection'
          minItems: 1
          description: Represents the Media Streaming Consumption event notification.
        msNetAssistInvocation:
          type: array
          items:
            $ref: '#/components/schemas/NetworkAssistanceInvocationsCollection'
          minItems: 1
          description: |
            Represents the Media Streaming Network Assistance Invocations event notification.
        msDynPlyInvocation:
          type: array
          items:
            $ref: '#/components/schemas/DynamicPolicyInvocationsCollection'
          minItems: 1
          description: Represents the Media Streaming Dynamic Policy Invocations event notification.
        msAccess:
          type: array
          items:
            $ref: '#/components/schemas/MediaStreamingAccessesCollection'
          minItems: 1
          description: Represents the Media Streaming access event notification.
        gnssAssistDataInfo:
          $ref: '#/components/schemas/GNSSAssistDataInfo'
        datVolTransTimeInfos:
          type: array
          items:
            $ref: '#/components/schemas/DatVolTransTimeCollection'
          minItems: 1
        appActiveTimeInfos:
          type: array
          items:
            $ref: '#/components/schemas/AppActiveTimeInfo'
          minItems: 1
        sigInfos:
          type: array
          items:
            $ref: '#/components/schemas/NfSignallingInfo'
          minItems: 1
        _rfSignalInfos:
          type: array
          items:
            $ref: '#/components/schemas/_RfSignalInfo'
          minItems: 1
        _powerEnergyConsumptionInfos:
          type: array
          items:
            $ref: '#/components/schemas/_PowerEnergyConsumptionInfo'
          minItems: 1
      required:
