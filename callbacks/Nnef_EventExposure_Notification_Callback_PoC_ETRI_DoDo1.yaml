      - orientationMajor
      properties:
        semiMajor:
          $ref: '#/components/schemas/Uncertainty'
        semiMinor:
          $ref: '#/components/schemas/Uncertainty'
        vertical:
          $ref: '#/components/schemas/Uncertainty'
        orientationMajor:
          $ref: '#/components/schemas/Orientation'
    UnidirectionalQoSSpecification:
      type: object
      required:
      - maximumBitRate
      properties:
        maximumBitRate:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/BitRate'
        maximumAuthorisedBitRate:
          $ref: '#/components/schemas/BitRate'
        minimumPacketLossRate:
          $ref: '#/components/schemas/PacketLossRate'
        pduSetQosLimits:
          $ref: '#/components/schemas/PduSetQosPara'
    UnitsAngularVelocity:
      type: string
      description: The units of angular velocity.
    UnitsLinearVelocity:
      type: string
      description: The the units of linear velocity.
    Uri:
      type: string
      description: string providing an URI formatted according to IETF RFC 3986.
    UsageThreshold:
