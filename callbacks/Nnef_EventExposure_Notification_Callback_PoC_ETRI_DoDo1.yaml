      - _timestamp
      - _PowerEnergyConsData
    _RefSignalMeasurements:
      description: Contains reference signal related information.
      type: object
      properties:
        _ratType:
          $ref: '#/components/schemas/RatType'
        _refSignalType:
          $ref: '#/components/schemas/_RefSignalType'
        _blockType:
          $ref: '#/components/schemas/_BlockType'
        _rsrp:
          type: string
        _rsrq:
          type: string
        _sinr:
          type: string
        _bler:
          $ref: '#/components/schemas/Float'
        _connectivity:
          $ref: '#/components/schemas/_ConnectivityType'
    _RefSignalType:
      type: string
      description: "Represents the preferred power state of cell.  \nPossible values are:\n- SS.\n- CSI.\n- CLI.\n- PRS.\n\
        - PSBCH. \n- PSCCH.\n- PDSCH.\n- PUSCH.\n- PDCCH. \n- PBCH.\n"
    _RfSignalData:
      description: Contains RF signal Data.
      type: object
      properties:
        _startTime:
          $ref: '#/components/schemas/DateTime'
        _duration:
          $ref: '#/components/schemas/DurationSec'
        _refSignalMeasurements:
          type: array
          items:
            $ref: '#/components/schemas/_RefSignalMeasurements'
          minItems: 1
    _RfSignalInfo:
      description: Contains RF signal related information collection.
      type: object
      properties:
        _timestamp:
