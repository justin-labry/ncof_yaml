            Refer to geographical Information. See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location. See ITU-T Recommendation Q.763 (1999) [24] clause 3.88.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        globalNgenbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
        globalENbId:
          $ref: '#/components/schemas/GlobalRanNodeId'
      required:
      - tai
      - ecgi
    EventRecordType:
      type: string
      description: Enumeration of event record types.
    ExtGroupId:
      description: External Identifier of a group of UEs
      type: string
      pattern: ^extgroupid-[^@]+@[^@]+$
    ExtPacketDelBudget:
      type: integer
      minimum: 1
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
    Float:
      format: float
      type: number
      description: string with format 'float' as defined in OpenAPI.
    FlowDescription:
      description: Defines a packet filter of an IP flow.
      type: string
    FlowDirection:
      type: string
      description: "Indicates the direction of the service data flow.  \nPossible values are:\n- DOWNLINK: The corresponding\
        \ filter applies for traffic to the UE.\n- UPLINK: The corresponding filter applies for traffic from the UE.\n- BIDIRECTIONAL:\
        \ The corresponding filter applies for traffic both to and from the UE.\n- UNSPECIFIED: The corresponding filter applies\
        \ for traffic to the UE (downlink), but has no\nspecific direction declared. The service data flow detection shall\
        \ apply the filter for\nuplink traffic as if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall only\ninclude the value UNSPECIFIED\
        \ in filters in UE-initiated procedures if the same value is\nreceived from the SMF.\n"
    FlowInfo:
      description: Represents IP flow information.
      type: object
      properties:
        flowId:
          type: integer
          description: Indicates the IP flow identifier.
        flowDescriptions:
          type: array
          items:
            type: string
          description: |
            Indicates the packet filters of the IP flow. Refer to clause 5.3.8 of 3GPP TS 29.214 for encoding. It shall contain UL and/or DL IP flow description.
          minItems: 1
          maxItems: 2
        tosTC:
          $ref: '#/components/schemas/TosTrafficClass'
      required:
      - flowId
    Fqdn:
      description: Fully Qualified Domain Name
      type: string
      pattern: ^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\.)+[A-Za-z]{2,63}\.?$
      minLength: 4
      maxLength: 253
    GADShape:
      description: Common base type for GAD shapes.
      type: object
      required:
      - shape
      properties:
        shape:
          $ref: '#/components/schemas/SupportedGADShapes'
      discriminator:
        propertyName: shape
        mapping:
          POINT: '#/components/schemas/Point'
          POINT_UNCERTAINTY_CIRCLE: '#/components/schemas/PointUncertaintyCircle'
          POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/PointUncertaintyEllipse'
          POLYGON: '#/components/schemas/Polygon'
          POINT_ALTITUDE: '#/components/schemas/PointAltitude'
          POINT_ALTITUDE_UNCERTAINTY: '#/components/schemas/PointAltitudeUncertainty'
          ELLIPSOID_ARC: '#/components/schemas/EllipsoidArc'
          LOCAL_2D_POINT_UNCERTAINTY_ELLIPSE: '#/components/schemas/Local2dPointUncertaintyEllipse'
          LOCAL_3D_POINT_UNCERTAINTY_ELLIPSOID: '#/components/schemas/Local3dPointUncertaintyEllipsoid'
    GNSSAssistData:
      type: string
      description: Represents GNSS Assistance Data encoded as specified in clause 6.5.2.1 of 3GPP TS 37.355 [31].
    GNSSAssistDataInfo:
      description: Represents GNSS Assistance Data related information.
      type: object
      properties:
        gnssAssistData:
          $ref: '#/components/schemas/GNSSAssistData'
        servArea:
          $ref: '#/components/schemas/GNSSServArea'
        sourceInfo:
          $ref: '#/components/schemas/GeographicalCoordinates'
      required:
      - gnssAssistData
      - servArea
    GNSSServArea:
      description: Represents the serving area of the GNSS Assistance Data.
      type: object
      properties:
        geographicalArea:
          $ref: '#/components/schemas/GeographicArea'
        taiList:
          type: array
          items:
            $ref: '#/components/schemas/Tai'
          minItems: 1
    GNbId:
      description: Provides the G-NB identifier.
      type: object
      properties:
        bitLength:
          type: integer
          minimum: 22
          maximum: 32
          description: |
            Unsigned integer representing the bit length of the gNB ID as defined in clause 9.3.1.6 of 3GPP TS 38.413 [11], within the range 22 to 32.
        gNBValue:
          type: string
          pattern: ^[A-Fa-f0-9]{6,8}$
          description: |
            This represents the identifier of the gNB. The value of the gNB ID shall be encoded in hexadecimal representation. Each character in the string shall take a value of "0" to "9", "a" to "f" or "A" to "F" and shall represent 4 bits. The padding 0 shall be added to make multiple nibbles,  the most significant character representing the padding 0 if required together with the 4 most significant bits of the gNB ID shall appear first in the string, and the character representing the 4 least significant bit of the gNB ID shall appear last in the string.
      required:
      - bitLength
      - gNBValue
    Gci:
      type: string
      description: |
        Global Cable Identifier uniquely identifying the connection between the 5G-CRG or FN-CRG to the 5GS. See clause 28.15.4 of 3GPP TS 23.003. This shall be encoded as a string per clause 28.15.4 of 3GPP TS 23.003, and compliant with the syntax specified  in clause 2.2  of IETF RFC 7542 for the username part of a NAI. The GCI value is specified in CableLabs WR-TR-5WWC-ARCH.
    GeographicArea:
      description: Geographic area specified by different shape.
      anyOf:
      - $ref: '#/components/schemas/Point'
      - $ref: '#/components/schemas/PointUncertaintyCircle'
      - $ref: '#/components/schemas/PointUncertaintyEllipse'
      - $ref: '#/components/schemas/Polygon'
      - $ref: '#/components/schemas/PointAltitude'
      - $ref: '#/components/schemas/PointAltitudeUncertainty'
      - $ref: '#/components/schemas/EllipsoidArc'
    GeographicalCoordinates:
      description: Geographical coordinates.
      type: object
      required:
      - lon
      - lat
      properties:
        lon:
          type: number
          format: double
          minimum: -180
          maximum: 180
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
    GeraLocation:
      type: object
      description: Exactly one of cgi, sai or lai shall be present.
      properties:
        locationNumber:
          type: string
          description: Location number within the PLMN. See 3GPP TS 23.003, clause 4.5.
        cgi:
          $ref: '#/components/schemas/CellGlobalId'
        sai:
          $ref: '#/components/schemas/ServiceAreaId'
        lai:
          $ref: '#/components/schemas/LocationAreaId'
        rai:
          $ref: '#/components/schemas/RoutingAreaId'
        vlrNumber:
          type: string
          description: VLR number. See 3GPP TS 23.003 clause 5.1.
        mscNumber:
          type: string
          description: MSC number. See 3GPP TS 23.003 clause 5.1.
        ageOfLocationInformation:
          type: integer
          minimum: 0
          maximum: 32767
          description: |
            The value represents the elapsed time in minutes since the last network contact of the mobile station. Value "0" indicates that the location information was obtained after a successful paging procedure for  Active Location Retrieval when the UE is in idle mode or after a successful location reporting procedure the UE is in connected mode. Any other value than "0" indicates that the location information is the last known one. See 3GPP TS 29.002 clause 17.7.8.
        ueLocationTimestamp:
          $ref: '#/components/schemas/DateTime'
        geographicalInformation:
          type: string
          pattern: ^[0-9A-F]{16}$
          description: |
            Refer to geographical Information.See 3GPP TS 23.032 clause 7.3.2. Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
        geodeticInformation:
          type: string
          pattern: ^[0-9A-F]{20}$
          description: |
            Refers to Calling Geodetic Location.See ITU-T Recommendation Q.763 (1999) clause 3.88.2.  Only the description of an ellipsoid point with uncertainty circle is allowed to be used.
    Gli:
      $ref: '#/components/schemas/Bytes'
    GlobalRanNodeId:
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        n3IwfId:
          $ref: '#/components/schemas/N3IwfId'
        gNbId:
          $ref: '#/components/schemas/GNbId'
        ngeNbId:
          $ref: '#/components/schemas/NgeNbId'
        wagfId:
          $ref: '#/components/schemas/WAgfId'
        tngfId:
          $ref: '#/components/schemas/TngfId'
        nid:
          $ref: '#/components/schemas/Nid'
        eNbId:
          $ref: '#/components/schemas/ENbId'
      description: |
        One of the six attributes n3IwfId, gNbIdm, ngeNbId, wagfId, tngfId, eNbId shall be present.
      required:
      - plmnId
    Gpsi:
      type: string
      pattern: ^(msisdn-[0-9]{5,15}|extid-[^@]+@[^@]+|.+)$
      description: "String identifying a Gpsi shall contain either an External Id or an MSISDN.  It shall be formatted as\
        \ follows -External Identifier= \"extid-'extid', where 'extid'  shall be formatted according to clause 19.7.2 of 3GPP\
        \ TS 23.003 that describes an  External Identifier. \n"
    GroupId:
      type: string
      pattern: ^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$
      description: "String identifying a group of devices network internal globally unique ID which identifies a set of IMSIs,\
        \ as specified in clause 19.9 of 3GPP TS 23.003. \n"
    HfcNId:
      type: string
      maxLength: 6
      description: |
        This IE represents the identifier of the HFC node Id as specified in CableLabs WR-TR-5WWC-ARCH. It is provisioned by the wireline operator as part of wireline operations and may contain up to six characters.
    HfcNodeId:
      description: REpresents the HFC Node Identifer received over NGAP.
      type: object
      required:
      - hfcNId
      properties:
        hfcNId:
          $ref: '#/components/schemas/HfcNId'
    HorizAxesOrientation:
      description: Horizontal axes orientation angle clockwise from northing in 0.1 degrees.
      type: integer
      minimum: 0
      maximum: 3600
    HorizontalSpeed:
      description: Indicates value of horizontal speed.
      type: number
      format: float
      minimum: 0
      maximum: 2047
    HorizontalVelocity:
      description: Horizontal velocity.
      type: object
      required:
      - hSpeed
      - bearing
      properties:
        hSpeed:
          $ref: '#/components/schemas/HorizontalSpeed'
        bearing:
          $ref: '#/components/schemas/Angle'
    HorizontalVelocityWithUncertainty:
      description: Horizontal velocity with speed uncertainty.
      type: object
      required:
      - hSpeed
      - bearing
      - hUncertainty
      properties:
        hSpeed:
          $ref: '#/components/schemas/HorizontalSpeed'
        bearing:
          $ref: '#/components/schemas/Angle'
        hUncertainty:
          $ref: '#/components/schemas/SpeedUncertainty'
    HorizontalWithVerticalVelocity:
      description: Horizontal and vertical velocity.
      type: object
      required:
      - hSpeed
      - bearing
      - vSpeed
      - vDirection
      properties:
        hSpeed:
          $ref: '#/components/schemas/HorizontalSpeed'
        bearing:
          $ref: '#/components/schemas/Angle'
        vSpeed:
          $ref: '#/components/schemas/VerticalSpeed'
        vDirection:
          $ref: '#/components/schemas/VerticalDirection'
    HorizontalWithVerticalVelocityAndUncertainty:
      description: Horizontal and vertical velocity with speed uncertainty.
      type: object
      required:
      - hSpeed
      - bearing
      - vSpeed
      - vDirection
      - hUncertainty
      - vUncertainty
      properties:
        hSpeed:
          $ref: '#/components/schemas/HorizontalSpeed'
        bearing:
          $ref: '#/components/schemas/Angle'
        vSpeed:
          $ref: '#/components/schemas/VerticalSpeed'
        vDirection:
          $ref: '#/components/schemas/VerticalDirection'
        hUncertainty:
          $ref: '#/components/schemas/SpeedUncertainty'
        vUncertainty:
          $ref: '#/components/schemas/SpeedUncertainty'
    InnerRadius:
      description: Indicates value of the inner radius.
      type: integer
      format: int32
      minimum: 0
      maximum: 327675
    InvalidParam:
      type: object
      properties:
        param:
          type: string
          description: |
            If the invalid parameter is an attribute in a JSON body, this IE shall contain the  attribute's name and shall be encoded as a JSON Pointer. If the invalid parameter is  an HTTP header, this IE shall be formatted as the concatenation of the string "header "  plus the name of such header. If the invalid parameter is a query parameter, this IE  shall be formatted as the concatenation of the string "query " plus the name of such  query parameter. If the invalid parameter is a variable part in the path of a resource  URI, this IE shall contain the name of the variable, including the symbols "{" and "}"  used in OpenAPI specification as the notation to represent variable path segments.
        reason:
          type: string
          description: |
            A human-readable reason, e.g. "must be a positive integer". In cases involving failed  operations in a PATCH request, the reason string should identify the operation that  failed using the operation's array index to assist in correlation of the invalid  parameter with the failed operation, e.g." Replacement value invalid for attribute  (failed operation index= 4)"
      required:
      - param
      description: It contains an invalid parameter and a related description.
    IpAddr:
      description: Contains an IP adresse.
      type: object
      properties:
        ipv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        ipv6Prefix:
          $ref: '#/components/schemas/Ipv6Prefix'
    IpPacketFilterSet:
      type: object
      required:
      - direction
      properties:
        direction:
          type: string
        sourceAddress:
          $ref: '#/components/schemas/IpAddr'
        destinationAddress:
          $ref: '#/components/schemas/IpAddr'
        protocolNumber:
          $ref: '#/components/schemas/Uint8'
        sourcePort:
          $ref: '#/components/schemas/Uint16'
        destinationPort:
          $ref: '#/components/schemas/Uint16'
        differentiatedServicesCodePoint:
          $ref: '#/components/schemas/Uint6'
        flowLabel:
          $ref: '#/components/schemas/Uint20'
        securityParametersIndex:
          $ref: '#/components/schemas/Uint32'
    Ipv4Addr:
      type: string
      pattern: ^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$
      example: 198.51.100.1
      description: |
        String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
    Ipv6Addr:
      type: string
      allOf:
      - pattern: ^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))$
      - pattern: ^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))$
      example: 2001:db8:85a3::8a2e:370:7334
      description: |
        String identifying an IPv6 address formatted according to clause 4 of RFC5952. The mixed IPv4 IPv6 notation according to clause 5 of RFC5952 shall not be used.
    Ipv6Prefix:
      type: string
      allOf:
      - pattern: ^((:|(0?|([1-9a-f][0-9a-f]{0,3}))):)((0?|([1-9a-f][0-9a-f]{0,3})):){0,6}(:|(0?|([1-9a-f][0-9a-f]{0,3})))(\/(([0-9])|([0-9]{2})|(1[0-1][0-9])|(12[0-8])))$
      - pattern: ^((([^:]+:){7}([^:]+))|((([^:]+:)*[^:]+)?::(([^:]+:)*[^:]+)?))(\/.+)$
      example: 2001:db8:abcd:12::0/64
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
    LineType:
      type: string
      description: |
        Possible values are:
        - DSL: Identifies a DSL line
        - PON: Identifies a PON line
    Local2dPointUncertaintyEllipse:
      description: Local 2D point with uncertainty ellipse
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - localOrigin
        - point
        - uncertaintyEllipse
        - confidence
        properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipse:
            $ref: '#/components/schemas/UncertaintyEllipse'
          confidence:
            $ref: '#/components/schemas/Confidence'
    Local3dPointUncertaintyEllipsoid:
      description: Local 3D point with uncertainty ellipsoid
      allOf:
      - $ref: '#/components/schemas/GADShape'
      - type: object
        required:
        - localOrigin
        - point
        - uncertaintyEllipsoid
        - confidence
        properties:
          localOrigin:
            $ref: '#/components/schemas/LocalOrigin'
          point:
            $ref: '#/components/schemas/RelativeCartesianLocation'
          uncertaintyEllipsoid:
            $ref: '#/components/schemas/UncertaintyEllipsoid'
          confidence:
            $ref: '#/components/schemas/Confidence'
          vConfidence:
            $ref: '#/components/schemas/Confidence'
    LocalOrigin:
      description: Indicates a Local origin in a reference system
      type: object
      required:
      - coordinateId
      properties:
        coordinateId:
          type: string
        point:
          $ref: '#/components/schemas/GeographicalCoordinates'
        area:
          $ref: '#/components/schemas/GeographicArea'
        horizAxesOrientation:
          $ref: '#/components/schemas/HorizAxesOrientation'
    LocationArea5G:
      description: Represents a user location area when the UE is attached to 5G.
      type: object
      properties:
        geographicAreas:
          type: array
          items:
            $ref: '#/components/schemas/GeographicArea'
          minItems: 0
          description: Identifies a list of geographic area of the user where the UE is located.
        civicAddresses:
          type: array
          items:
            $ref: '#/components/schemas/CivicAddress'
          minItems: 0
          description: Identifies a list of civic addresses of the user where the UE is located.
        nwAreaInfo:
          $ref: '#/components/schemas/NetworkAreaInfo'
    LocationAreaId:
      description: Contains a Location area identification as defined in 3GPP TS 23.003, clause 4.1.
      type: object
      required:
      - plmnId
      - lac
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        lac:
          type: string
          pattern: ^[A-Fa-f0-9]{4}$
          description: Location Area Code.
    MacAddr48:
      type: string
      pattern: ^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
    Mcc:
      type: string
      pattern: ^\d{3}$
      description: "Mobile Country Code part of the PLMN, comprising 3 digits, as defined in clause 9.3.3.5 of 3GPP TS 38.413.\
        \ \n"
    MediaDeliverySessionId:
      type: string
      description: A unique identifier for a media delivery session.
    MediaStreamingAccess:
      type: object
      description: Common properties of a single media access by the Media Stream Handler.
      required:
      - mediaStreamHandlerEndpointAddress
      - applicationServerEndpointAddress
      - requestMessage
      - responseMessage
      - processingLatency
      properties:
        mediaStreamHandlerEndpointAddress:
          $ref: '#/components/schemas/EndpointAddress'
        applicationServerEndpointAddress:
          $ref: '#/components/schemas/EndpointAddress'
        requestMessage:
          type: object
          required:
          - method
          - url
          - protocolVersion
          - size
          - bodySize
          properties:
            method:
              type: string
            url:
              $ref: '#/components/schemas/AbsoluteUrl'
            protocolVersion:
              type: string
            range:
              type: string
            size:
              $ref: '#/components/schemas/Uinteger'
            bodySize:
              $ref: '#/components/schemas/Uinteger'
            contentType:
              type: string
            userAgent:
              type: string
            userIdentity:
              type: string
            referer:
              $ref: '#/components/schemas/AbsoluteUrl'
        cacheStatus:
          $ref: '#/components/schemas/CacheStatus'
        responseMessage:
          type: object
          required:
          - responseCode
          - size
          - bodySize
          properties:
            responseCode:
              $ref: '#/components/schemas/Uinteger'
            size:
              $ref: '#/components/schemas/Uinteger'
            bodySize:
              $ref: '#/components/schemas/Uinteger'
            contentType:
              type: string
        processingLatency:
          $ref: '#/components/schemas/Float'
        connectionMetrics:
          type: object
          required:
          - meanNetworkRoundTripTime
          - networkRoundTripTimeVariation
          - congestionWindowSize
          properties:
            meanNetworkRoundTripTime:
              $ref: '#/components/schemas/Float'
            networkRoundTripTimeVariation:
              $ref: '#/components/schemas/Float'
            congestionWindowSize:
              $ref: '#/components/schemas/Uinteger'
    MediaStreamingAccessEvent:
      description: A Media Streaming Access Event record.
      allOf:
      - $ref: '#/components/schemas/BaseEventRecord'
      - $ref: '#/components/schemas/MediaStreamingAccess'
    MediaStreamingAccessesCollection:
      description: A collection of Media Streaming Access Event records.
      allOf:
      - $ref: '#/components/schemas/BaseEventCollection'
      - type: object
        required:
        - records
        properties:
          records:
            type: array
            minItems: 0
            items:
              $ref: '#/components/schemas/MediaStreamingAccessEvent'
            description: A set of records, each one describing one media streaming access.
    MediaTransportProto:
      type: string
      description: |
        The enumeration MediaTransportProto indicates the transport protocol used for a media flow.
    MediaType:
      type: string
      description: Indicates the media type of a media component.
    Mnc:
      type: string
      pattern: ^\d{2,3}$
      description: "Mobile Network Code part of the PLMN, comprising 2 or 3 digits, as defined in  clause 9.3.3.5 of 3GPP\
        \ TS 38.413. \n"
    MpxMediaInfo:
      description: Contains the Multiplexed Media Identification Information.
      type: object
      properties:
        ssrcId:
          $ref: '#/components/schemas/Uint32'
        payloadType:
          type: integer
          minimum: 0
          maximum: 127
        identificationTag:
          type: string
        rtpSdesHdrExtId:
          $ref: '#/components/schemas/Uinteger'
        rtcpPacketType:
          type: integer
          minimum: 0
          maximum: 255
      anyOf:
      - required:
        - ssrcId
      - required:
        - payloadType
      - required:
        - identificationTag
      - required:
        - rtcpPacketType
      - required:
        - identificationTag
        - rtpSdesHdrExtId
    MriTransferMethod:
      type: string
      description: "This data type indicates the method used for transferring Media Related Information.  \n"
    MsConsumptionCollection:
      description: |
        Contains the Media Streaming Consumption information collected for an UE Application via AF.
      type: object
      properties:
        msConsumps:
          type: array
          items:
            type: string
            description: |
              Represents the Media Streaming Consumption reports with formatting as specified in  clause 11.3.3 of 3GPP TS 26.512 [30], if required for Media Streaming UE Application.
          minItems: 1
      required:
      - msConsumps
    MsQoeMetricsCollection:
      description: |
        Contains the Media Streaming QoE metrics information collected for an UE Application via AF.
      type: object
      properties:
        msQoeMetrics:
          type: array
          items:
            type: string
          minItems: 1
      required:
      - msQoeMetrics
    N3IwfId:
      type: string
      pattern: ^[A-Fa-f0-9]+$
      description: "This represents the identifier of the N3IWF ID as specified in clause 9.3.1.57 of  3GPP TS 38.413 in hexadecimal\
        \ representation. Each character in the string shall take a value  of \"0\" to \"9\", \"a\" to \"f\" or \"A\" to \"\
        F\" and shall represent 4 bits. The most significant  character representing the 4 most significant bits of the N3IWF\
        \ ID shall appear first in the  string, and the character representing the 4 least significant bit of the N3IWF ID\
        \ shall  appear last in the string. \n"
    N3gaLocation:
      description: Contains the Non-3GPP access user location.
      type: object
      properties:
        n3gppTai:
          $ref: '#/components/schemas/Tai'
        n3IwfId:
          type: string
          pattern: ^[A-Fa-f0-9]+$
          description: "This IE shall contain the N3IWF identifier received over NGAP and shall be encoded as a  string of\
            \ hexadecimal characters. Each character in the string shall take a value of \"0\"  to \"9\", \"a\" to \"f\" or\
            \ \"A\" to \"F\" and shall represent 4 bits. The most significant  character representing the 4 most significant\
            \ bits of the N3IWF ID shall appear first in  the string, and the character representing the 4 least significant\
            \ bit of the N3IWF ID  shall appear last in the string. \n"
        ueIpv4Addr:
          $ref: '#/components/schemas/Ipv4Addr'
        ueIpv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          $ref: '#/components/schemas/Uinteger'
        protocol:
          $ref: '#/components/schemas/TransportProtocol'
        tnapId:
          $ref: '#/components/schemas/TnapId'
        twapId:
          $ref: '#/components/schemas/TwapId'
        hfcNodeId:
          $ref: '#/components/schemas/HfcNodeId'
        gli:
          $ref: '#/components/schemas/Gli'
        w5gbanLineType:
          $ref: '#/components/schemas/LineType'
        gci:
          $ref: '#/components/schemas/Gci'
    Ncgi:
      description: Contains the NCGI (NR Cell Global Identity), as described in 3GPP 23.003
      type: object
      properties:
        plmnId:
          $ref: '#/components/schemas/PlmnId'
        nrCellId:
          $ref: '#/components/schemas/NrCellId'
        nid:
          $ref: '#/components/schemas/Nid'
      required:
      - plmnId
      - nrCellId
    NefEvent:
      type: string
      description: "Represents a Network Exposure Event.  \nPossible values are:\n- SVC_EXPERIENCE: Indicates that the subscribed/notified\
        \ event is service experience\n  information for an application.\n- UE_MOBILITY: Indicates that the subscribed/notified\
        \ event is UE mobility information.\n- UE_COMM: Indicates that the subscribed/notified event is UE communication information.\n\
        - EXCEPTIONS: Indicates that the subscribed/notified event is exceptions information.\n- USER_DATA_CONGESTION: Indicates\
        \ that the subscribed/notified event is user data congestion\n  analytics related information.\n- PERF_DATA: Indicates\
        \ that the subscribed/notified event is performance data information.\n- DISPERSION: Indicates that the subscribed/notified\
        \ event is dispersion information.\n- COLLECTIVE_BEHAVIOUR: Indicates that the subscribed/notified event is collective\
        \ behaviour\n  information.\n- MS_QOE_METRICS: Indicates that the subscribed/notified event is Media Streaming QoE\n\
        \  metrics.\n- MS_CONSUMPTION: Indicates that the subscribed/notified event is Media Streaming\n  consumption reports.\n\
        - MS_NET_ASSIST_INVOCATION: Indicates that the subscribed/notified event is Media Streaming\n  network assistance\
        \ invocation.\n- MS_DYN_POLICY_INVOCATION: Indicates that the subscribed/notified event is Media Streaming\n  dynamic\
        \ policy invocation.\n- MS_ACCESS_ACTIVITY: Indicates that the subscribed/notified event is Media Streaming access\n\
        \  activity.\n- GNSS_ASSISTANCE_DATA: Indicates that the subscribed/notified event is GNSS Assistance Data\n  Collection.\n\
        - DATA_VOLUME_TRANSFER_TIME: Indicates that the event subscribed is data volume transfer \n  time information.\n-\
        \ APP_ACTIVE_TIME: Indicates that the event subscribed is application activation time\n  information.\n- SIGNALLING_INFO:\
        \ Indicates that the event subscribed/notified is signalling information.\n"
    NefEventExposureNotif:
      description: |
        Represents notifications on network exposure event(s) that occurred for an Individual Network Exposure Event Subscription resource.
      type: object
      properties:
        notifId:
          type: string
        eventNotifs:
          type: array
          items:
            $ref: '#/components/schemas/NefEventNotification'
          minItems: 1
      required:
      - notifId
      - eventNotifs
    NefEventNotification:
